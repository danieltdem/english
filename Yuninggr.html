<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectrum Spelling Grade 4 複習測驗</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; line-height: 1.6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        h2 { color: #2980b9; margin-top: 30px; font-size: 1.2em; background: #eaf2f8; padding: 10px; border-left: 5px solid #3498db; }
        .question-row { margin-bottom: 15px; display: flex; align-items: center; flex-wrap: wrap; }
        .question-label { flex: 0 0 250px; font-weight: bold; }
        input[type="text"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 150px; font-size: 16px; }
        button { display: block; width: 100%; padding: 15px; background-color: #27ae60; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 30px; transition: background 0.3s; }
        button:hover { background-color: #219150; }
        .feedback { margin-top: 10px; padding: 15px; border-radius: 6px; display: none; background-color: #f9f9f9; border-left: 4px solid #7f8c8d; }
        .correct { color: #27ae60; font-weight: bold; }
        .incorrect { color: #e74c3c; font-weight: bold; }
        .explanation { font-size: 0.9em; color: #555; margin-top: 5px; }
        .grammar-note { color: #8e44ad; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 英文拼字複習 (Grade 4)</h1>
    <p>寧寧，請根據圖片內容填入正確的單字，完成後點擊最下方的按鈕查看詳解喔！</p>

    <h2>Part 1: Write the antonym (反義字)</h2>
    <div id="antonyms-list"></div>

    <h2>Part 2: Write the word that belongs (分類詞)</h2>
    <div id="wordgroups-list"></div>

    <button onclick="checkAnswers()">送出答案並查看詳解</button>
</div>

<script>
const data = {
    antonyms: [
        { q: "1. same", a: "different", exp: "Different (不同的) 是 same (相同的) 的相反詞。" },
        { q: "2. rich", a: "poor", exp: "Poor (貧窮的) 是 rich (富有) 的相反詞。" },
        { q: "3. husbands", a: "wives", exp: "Wives (妻子們) 是 husband 的複數對應詞。注意：wife 的複數要去掉 f 改成 ves。" },
        { q: "4. wonderful", a: "terrible", exp: "Terrible (糟糕的/可怕的) 與 wonderful (極好的) 程度完全相反。" },
        { q: "5. forget", a: "remember", exp: "Remember (記得) 是 forget (忘記) 的相反動作。" },
        { q: "6. old", a: "young", exp: "Young (年輕的) 用來描述年紀，與 old (老的) 相反。" },
        { q: "7. complex", a: "simple", exp: "Simple (簡單的) 與 complex (複雜的) 相對。" },
        { q: "8. open", a: "close", exp: "Close (關閉) 是 open (開啟) 的反義字。" },
        { q: "9. question", a: "answer", exp: "Answer (回答) 是對 question (提問) 的回應。" },
        { q: "10. for", a: "against", exp: "Against (反對) 在支持/反對的語境下是 for (贊成) 的相反詞。" }
    ],
    groups: [
        { q: "11. eighths, fourths, thirds,", a: "halves", exp: "這組全是『分數 (Fractions)』。Halves (一半) 是 half 的複數型態。" },
        { q: "12. chicks, lambs, foals,", a: "calves", exp: "這組全是『幼年動物』。Calves (小牛) 是 calf 的複數。Chicks(小雞), lambs(小羊), foals(小馬)。" },
        { q: "13. plates, forks, spoons,", a: "knives", exp: "這組是『餐具 (Cutlery/Tableware)』。Knives (刀子) 是 knife 的複數。" },
        { q: "14. hill, volcano, cliff,", a: "mountain", exp: "這組是『地形 (Landforms)』。Mountain (山) 與丘陵、火山、懸崖同類。" },
        { q: "15. point, line, side,", a: "angle", exp: "這組是『幾何術語 (Geometry)』。Angle (角度) 與點、線、面相關。" },
        { q: "16. riddle, mystery, maze,", a: "puzzle", exp: "這組是『智力挑戰 (Brain teasers)』。Puzzle (謎題/拼圖) 與謎語、神祕事物、迷宮同類。" },
        { q: "17. moan, shriek, cry,", a: "groan", exp: "這組是『聲音 (Sounds)』，特別是不舒服的聲音。Groan (呻吟) 與呻吟、尖叫、哭喊同類。" },
        { q: "18. twice, couple, pair,", a: "double", exp: "這組與『數字 2 (Groups of two)』有關。Double (兩倍) 與兩次、一對同義。" }
    ]
};

function render() {
    const antList = document.getElementById('antonyms-list');
    data.antonyms.forEach((item, index) => {
        antList.innerHTML += `
            <div class="question-row">
                <div class="question-label">${item.q}</div>
                <input type="text" id="ant-${index}">
                <div id="ant-fb-${index}" class="feedback"></div>
            </div>`;
    });

    const grpList = document.getElementById('wordgroups-list');
    data.groups.forEach((item, index) => {
        grpList.innerHTML += `
            <div class="question-row">
                <div class="question-label">${item.q}</div>
                <input type="text" id="grp-${index}">
                <div id="grp-fb-${index}" class="feedback"></div>
            </div>`;
    });
}

function checkAnswers() {
    data.antonyms.forEach((item, index) => {
        const userAns = document.getElementById(`ant-${index}`).value.trim().toLowerCase();
        const fb = document.getElementById(`ant-fb-${index}`);
        fb.style.display = 'block';
        const isCorrect = userAns === item.a.toLowerCase();
        fb.innerHTML = `<span class="${isCorrect ? 'correct' : 'incorrect'}">${isCorrect ? '✅ 正確' : '❌ 答案是: ' + item.a}</span>
                        <div class="explanation">${item.exp}</div>`;
    });

    data.groups.forEach((item, index) => {
        const userAns = document.getElementById(`grp-${index}`).value.trim().toLowerCase();
        const fb = document.getElementById(`grp-fb-${index}`);
        fb.style.display = 'block';
        const isCorrect = userAns === item.a.toLowerCase();
        fb.innerHTML = `<span class="${isCorrect ? 'correct' : 'incorrect'}">${isCorrect ? '✅ 正確' : '❌ 答案是: ' + item.a}</span>
                        <div class="explanation">${item.exp}</div>`;
    });
}

render();
</script>
</body>
</html>
