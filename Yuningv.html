        const words = [

            { en: 'Poor', zh: 'иІ§зӘ®зҡ„ (г„Ҷг„§г„ЈЛҠ г„‘г„©г„ҘЛҠ г„үг„ңЛҷ)', mnemonic: 'иҒҪиө·дҫҶеғҸгҖҢз ҙгҖҚгҖӮиЎЈжңҚз ҙз ҙзҲӣзҲӣзҡ„пјҢд»ЈиЎЁе®¶еўғеҸҜиғҪеҫҲиІ§зӘ® (`poor`)гҖӮ' },
            { en: 'Waist', zh: 'и…° (г„§г„ )', mnemonic: 'зҷјйҹіе’Ң `waste` (жөӘиІ») дёҖжЁЎдёҖжЁЈгҖӮдёҚиҰҒжҠҠжөӘиІ» (`waste`) зҡ„йЈҹзү©и®ҠжҲҗи„ӮиӮӘеӣӨз©ҚеңЁи…° (`waist`) дёҠпјҒ' },
            { en: 'Peak', zh: 'еұұеі° (г„•г„ў г„Ҳг„Ҙ)', mnemonic: 'зҷјйҹіе’Ң `peek` (еҒ·зңӢ) дёҖжЁЈгҖӮзҲ¬еҲ°жңҖй«ҳзҡ„еұұеі° (`peak`) дёҠеҒ·зңӢ (`peek`) зҫҺйә—зҡ„йўЁжҷҜгҖӮ' },
            { en: 'Thieves', zh: 'е°ҸеҒ·еҖ‘ (г„’г„§г„ ЛҮ г„Ҡг„Ў г„Үг„ЈЛҠ)', mnemonic: 'йҖҷжҳҜ `thief` (е°ҸеҒ·) зҡ„иӨҮж•ёгҖӮдёҖзҫӨе°ҸеҒ· (`thieves`) и¶ҒеӨ©й»‘жҷӮи·‘йҖІдҫҶдәҶгҖӮ' },
            { en: 'Knives', zh: 'еҲҖеӯҗеҖ‘ (г„үг„  г„—Лҷ г„Үг„ЈЛҠ)', mnemonic: 'йҖҷжҳҜ `knife` (еҲҖеӯҗ) зҡ„иӨҮж•ёгҖӮе»ҡжҲҝиЈЎж”ҫдәҶиЁұеӨҡйӢ’еҲ©зҡ„еҲҖеӯҗ (`knives`)гҖӮ' },
            { en: 'Taste', zh: 'е“Ғеҡҗ / е‘ійҒ“ (г„Ёг„ҹЛӢ г„үг„ ЛӢ)', mnemonic: 'иҒҪиө·дҫҶеҫҲеғҸ `test` (жё¬и©Ұ)гҖӮе“Ғеҡҗ (`taste`) е…¶еҜҰе°ұжҳҜеңЁжё¬и©Ұ (`test`) йЈҹзү©еҘҪдёҚеҘҪеҗғгҖӮ' },

            { en: 'Circus', zh: 'йҰ¬жҲІеңҳ (г„Үг„ҡЛҮ г„’г„§ЛӢ г„Ҡг„Ёг„ўЛҠ)', mnemonic: 'иҒҪиө·дҫҶеғҸ `circle` (ең“еңҲ)гҖӮйҰ¬жҲІеңҳ (`circus`) зҡ„иЎЁжј”иҲһеҸ°йҖҡеёёжҳҜдёҖеҖӢеӨ§ең“еңҲ (`circle`)гҖӮ' },
            { en: 'Celebrate', zh: 'ж…¶зҘқ (г„‘г„§г„ҘЛӢ г„“г„ЁЛӢ)', mnemonic: 'еүҚйқўжҳҜ `celeb` (еҗҚдәә/celebrity)гҖӮжғіеғҸиҮӘе·ұеғҸеҖӢеҗҚдәә (`celebrity`) дёҖжЁЈй–Ӣжҙҫе°Қж…¶зҘқ (`celebrate`)пјҒ' },
            { en: 'Promise', zh: 'жүҝи«ҫ (г„”г„ҘЛҠ г„Ӣг„Ёг„ӣЛӢ)', mnemonic: '`pro` (еҗ‘еүҚ) + `miss` (йҢҜйҒҺ)гҖӮжҲ‘еҗ‘дҪ жүҝи«ҫ (`promise`)пјҢжңӘдҫҶзҡ„ж—ҘеӯҗжҲ‘зө•е°ҚдёҚжңғеҶҚйҢҜйҒҺ (`miss`)гҖӮ' },
            { en: 'Exciting', zh: 'д»ӨдәәиҲҲеҘ®зҡ„ (г„Ңг„§г„ҘЛӢ г„–г„ЈЛҠ г„’г„§г„Ҙ г„Ҳг„ЈЛӢ г„үг„ңЛҷ)', mnemonic: '`excit(e)` + `ing`гҖӮзңӢйӣ»еҪұзңӢеҲ°еҫһеҮәеҸЈ (`exit`) и·іиө·дҫҶпјҢзңҹжҳҜд»ӨдәәиҲҲеҘ® (`exciting`)пјҒ' },

            { en: 'Exercise', zh: 'йҒӢеӢ• (г„©г„ЈЛӢ г„үг„Ёг„ҘЛӢ)', mnemonic: 'еҢ…еҗ« `size` (е°әеҜё/й«”еһӢ) зҡ„зҷјйҹігҖӮеӨҡеҒҡйҒӢеӢ• (`exercise`) еҸҜд»Ҙе№«еҠ©дҪ з¶ӯжҢҒе®ҢзҫҺзҡ„й«”еһӢ (`size`)гҖӮ' },
            { en: 'Melon', zh: 'з”ңз“ң (г„Ҡг„§г„ўЛҠ г„Қг„Ёг„ҡ)', mnemonic: 'жҳҜ `lemon` (жӘёжӘ¬) еӯ—жҜҚйҮҚж–°жҺ’еҲ—гҖӮжҠҠй…ёй…ёзҡ„жӘёжӘ¬ (`lemon`) и®Ҡз”ңпјҢе°ұжҲҗдәҶз”ңз“ң (`melon`)гҖӮ' },
            { en: 'Violin', zh: 'е°ҸжҸҗзҗҙ (г„’г„§г„ ЛҮ г„Ҡг„§ЛҠ г„‘г„§г„ЈЛҠ)', mnemonic: 'иҒҪиө·дҫҶеғҸ `violence` (жҡҙеҠӣ)гҖӮйҖҷжҠҠе°ҸжҸҗзҗҙ (`violin`) еҫҲиІҙпјҢи«Ӣиј•иј•жӢүпјҢдёҚиҰҒе°Қе®ғдҪҝз”ЁжҡҙеҠӣ (`violence`)гҖӮ' },
            { en: 'Upper', zh: 'дёҠйқўзҡ„ (г„•г„ӨЛӢ г„Үг„§г„ўЛӢ г„үг„ңЛҷ)', mnemonic: '`up` (дёҠ) + `per`гҖӮеңЁжҜ”еҺҹжң¬жӣҙй«ҳгҖҒжӣҙдёҠйқў (`up`) зҡ„дҪҚзҪ®гҖӮ' },
            { en: 'Steak', zh: 'зүӣжҺ’ (г„Ӣг„§г„ЎЛҠ г„Ҷг„һЛҠ)', mnemonic: 'зҷјйҹіе’Ң `steal` (еҒ·) жңүй»һеғҸгҖӮйҖҷеЎҠзүӣжҺ’ (`steak`) зңӢиө·дҫҶеӨӘеҘҪеҗғдәҶпјҢеҘҪжғіжҠҠе®ғеҒ· (`steal`) иө°пјҒ' },
            { en: 'Voter', zh: 'жҠ•зҘЁиҖ… (г„Ҡг„ЎЛҠ г„Ҷг„§г„ ЛӢ г„“г„ңЛҮ)', mnemonic: '`vote` (жҠ•зҘЁ) + `er` (зҡ„дәә)гҖӮеҺ»еҸғеҠ жҠ•зҘЁ (`vote`) зҡ„дәәе°ұжҳҜжҠ•зҘЁиҖ… (`voter`)гҖӮ' },
            { en: 'Marry', zh: 'зөҗе©ҡ (г„җг„§г„қЛҠ г„Ҹг„Ёг„Ј)', mnemonic: 'зҷјйҹіи·ҹ `merry` (еҝ«жЁӮзҡ„) дёҖжЁЎдёҖжЁЈгҖӮзөҗе©ҡ (`marry`) е°ҚеӨ§е®¶дҫҶиӘӘжҳҜдёҖд»¶еҫҲеҝ«жЁӮзҡ„ (`merry`) е–ңдәӢгҖӮ' },
            { en: 'Novel', zh: 'е°ҸиӘӘ (г„’г„§г„ ЛҮ г„•г„Ёг„ӣ)', mnemonic: '`no` (жІ’жңү) + `vel` (иҒҪиө·дҫҶеғҸ bell, йҲҙиҒІ)гҖӮжІ’жңү (`no`) йӣ»и©ұйҲҙиҒІ (`bell`) жү“ж“ҫпјҢзөӮж–јеҸҜд»Ҙе®үйқңзңӢе°ҸиӘӘ (`novel`) дәҶгҖӮ' },
            { en: 'Youth', zh: 'йқ’жҳҘ / е№ҙиј•дәә (г„‘г„§г„Ҙ г„”г„Ёг„Ј)', mnemonic: 'иҒҪиө·дҫҶеғҸ `you` (дҪ ) + `th`гҖӮдҪ  (`you`) еҸӘжңүдёҖж¬ЎеҜ¶иІҙзҡ„йқ’жҳҘ (`youth`)пјҢеҘҪеҘҪжҠҠжҸЎеҗ§пјҒ' },
            { en: 'Photo', zh: 'з…§зүҮ (г„“г„ ЛӢ г„Ҷг„§г„ўЛӢ)', mnemonic: 'еүҚйқўиҒҪиө·дҫҶеғҸ `potato`гҖӮжӢҚз…§зҡ„жҷӮеҖҷеҰӮжһңдёҚжғіиӘӘ cheeseпјҢеҸҜд»ҘиӘӘ potato дҫҶжӢҚз…§зүҮ (`photo`)гҖӮ' },
            { en: 'sheet', zh: 'еәҠе–® / зҙҷејө (г„”г„Ёг„ӨЛҠ г„үг„ў)', mnemonic: 'зҷјйҹіеҫҲеғҸ `sheep` (зҫҠ)гҖӮиәәеңЁиҲ’жңҚзҡ„еәҠе–® (`sheet`) дёҠпјҢй–үи‘—зңјзқӣж•ёзҫҠ (`sheep`) зқЎиҰәгҖӮ' },
            { en: 'luggage', zh: 'иЎҢжқҺ (г„’г„§г„ҘЛҠ г„Ңг„§ЛҮ)', mnemonic: '`lug` (з”ЁеҠӣжӢ–жӢү) + `gage`гҖӮеҮәеңӢжҷӮйңҖиҰҒз”ЁеҠӣжӢ–жӢү (`lug`) иө°дҫҶиө°еҺ»зҡ„йҮҚзү©пјҢе°ұжҳҜиЎҢжқҺ (`luggage`)гҖӮ' },
            { en: 'groan', zh: 'е‘»еҗҹ (г„•г„Ј г„§г„ЈЛҠ)', mnemonic: 'зҷјйҹіи·ҹ `grown` (й•·еӨ§) дёҖжЁЎдёҖжЁЈгҖӮй•·еӨ§ (`grown`) еҫҢз”ҹжҙ»жңүеҫҲеӨҡз…©жғұпјҢеёёеёёи®“дәәеҝҚдёҚдҪҸзҷјеҮәе‘»еҗҹ (`groan`)гҖӮ' },
            { en: 'add', zh: 'еўһеҠ  (г„—г„Ҙ г„җг„§г„ҡ)', mnemonic: 'зҷјйҹіе’ҢжӢјеҜ«йғҪеҫҲеғҸ `ad` (е»Је‘Ҡ)гҖӮз¶Ій ҒдёҠдёҖзӣҙеўһеҠ  (`add`) и·іеҮәдҫҶзҡ„е»Је‘Ҡ (`ad`) зңҹзҡ„еҫҲз…©дәәпјҒ' },
            { en: 'share', zh: 'еҲҶдә« (г„Ҳг„Ј г„’г„§г„ӨЛҮ)', mnemonic: 'еҢ…еҗ« `she` (еҘ№) + `are` (жҳҜ)гҖӮеҘ№еҖ‘ (`she`) жҳҜдёҖзҫӨеҫҲжЁӮж„ҸиҲҮеҲҘдәәеҲҶдә« (`share`) зҡ„еҘҪжңӢеҸӢгҖӮ' },
            { en: 'garbage', zh: 'еһғеңҫ (г„Ңг„ңЛӢ г„ҷг„ңЛӢ)', mnemonic: '`garb` (жңҚиЈқ) + `age` (жҷӮд»Ј)гҖӮйҖҷеҖӢжҷӮд»Ј (`age`) ж—©е°ұйҒҺжҷӮзҡ„иҲҠиЎЈжңҚ (`garb`)пјҢеҸӘиғҪз•¶дҪңеһғеңҫ (`garbage`) дёҹжҺүдәҶгҖӮ' },
            { en: 'cereal', zh: 'йәҘзүҮ (г„Үг„һЛӢ г„Ҷг„§г„ўЛӢ)', mnemonic: 'зҷјйҹіи·ҹ `serial` (йҖЈзәҢеҠҮ) дёҖжЁЎдёҖжЁЈгҖӮжҜҸеӨ©ж—©дёҠйғҪеҗғдёҖжЁЈзҡ„йәҘзүҮ (`cereal`)пјҢе°ұеғҸеңЁзңӢжҜҸеӨ©ж’ӯзҡ„йҖЈзәҢеҠҮ (`serial`) дёҖжЁЈгҖӮ' },
            { en: 'nightmare', zh: 'жғЎеӨў (г„ңЛӢ г„Үг„ҘЛӢ)', mnemonic: '`night` (еӨңжҷҡ) + `mare` (жҜҚйҰ¬)гҖӮеңЁеӨңжҷҡ (`night`) иў«дёҖеҢ№зҳӢзӢӮзҡ„жҜҚйҰ¬ (`mare`) иҝҪи‘—и·‘пјҢзңҹжҳҜдёҖе ҙеҸҜжҖ•зҡ„жғЎеӨў (`nightmare`)гҖӮ' }
        ];

        /* --- иӘһйҹіжң—и®Җ API --- */
        function speakWord(word) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                window.speechSynthesis.speak(utterance);
            } else {
                alert("еҫҲжҠұжӯүпјҢжӮЁзҡ„зҖҸиҰҪеҷЁзӣ®еүҚдёҚж”ҜжҸҙиӘһйҹіжң—и®ҖеҠҹиғҪе–”пјҒ");
            }
        }

        /* --- е®үе…Ёжҙ—зүҢжј”з®—жі• --- */
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const temp = array[i];
                array[i] = array[j];
                array[j] = temp;
            }
        }

        /* --- й ҒйқўеҲҮжҸӣйӮҸијҜ --- */
        function goHome() {
            document.getElementById('menu-screen').style.display = 'block';
            document.getElementById('exam-screen').style.display = 'none';
            document.getElementById('practice-screen').style.display = 'none'; 
            document.body.classList.remove('practice-mode');
        }

        function goToExam() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('exam-screen').style.display = 'block';
            document.getElementById('practice-screen').style.display = 'none';
            document.body.classList.remove('practice-mode');
            startGame(words);
        }

        function goToPractice() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('exam-screen').style.display = 'none';
            document.getElementById('practice-screen').style.display = 'flex'; 
            document.body.classList.add('practice-mode');
            renderPracticeList();
            resetPracticeState();
        }

        /* --- з·ҙзҝ’жЁЎејҸйӮҸијҜ --- */
        let areAnswersVisible = false;

        function resetPracticeState() {
            areAnswersVisible = false;
            const btn = document.getElementById('toggle-all-btn');
            btn.innerHTML = 'йЎҜзӨәжүҖжңүзӯ”жЎҲ / жү№ж”№<br><span style="font-size:0.8em">г„’г„§г„ўЛҮ г„•ЛӢ г„үг„ҡЛҠ г„ўЛӢ</span>';
            btn.style.backgroundColor = '#d32f2f';
        }

        function renderPracticeList() {
            const listContainer = document.getElementById('practice-list');
            listContainer.innerHTML = '';

            words.forEach((word, index) => {
                const rowContainer = document.createElement('div');
                rowContainer.className = 'practice-row-container';
                rowContainer.innerHTML = `
                    <div class="practice-row">
                        <div class="col-zh">${word.zh}</div>
                        <div class="col-input">
                            <input type="text" class="practice-input" id="p-input-${index}" placeholder="жӢјеҜ«..." autocomplete="off">
                        </div>
                        <div class="col-ans">
                            <div id="ans-${index}" class="answer-text">
                                ${word.en}
                                <button class="tts-btn" onclick="speakWord('${word.en}')" title="е”ёеҮәе–®еӯ—">рҹ”Ҡ</button>
                            </div>
                        </div>
                    </div>
                    <div id="p-mnemonic-${index}" class="practice-mnemonic">
                        рҹ’Ў <b>иЁҳжҶ¶жҸҗзӨәпјҡ</b>${word.mnemonic}
                    </div>
                `;
                listContainer.appendChild(rowContainer);
            });
        }

        // зӣЈиҒҪж•ҙеҖӢз·ҙзҝ’еҲ—иЎЁзҡ„ Enter йҚө
        document.getElementById('practice-list-container').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                toggleAllAnswers();
            }
        });

        function toggleAllAnswers() {
            const btn = document.getElementById('toggle-all-btn');
            const answers = document.querySelectorAll('.answer-text');
            const inputs = document.querySelectorAll('.practice-input');

            areAnswersVisible = !areAnswersVisible;

            if (areAnswersVisible) {
                // зӢҖж…ӢпјҡйЎҜзӨәзӯ”жЎҲ & жү№ж”№
                btn.innerHTML = 'йҡұи—ҸжүҖжңүзӯ”жЎҲ<br><span style="font-size:0.8em">г„§г„ЈЛҮ г„ҳг„ӨЛҠ г„үг„ҡЛҠ г„ўЛӢ</span>';
                btn.style.backgroundColor = '#4CAF50';
                
                answers.forEach(el => el.style.display = 'block');

                inputs.forEach((input, index) => {
                    const userWord = input.value.trim().toLowerCase();
                    const correctWord = words[index].en.toLowerCase();
                    const mnemonicDiv = document.getElementById(`p-mnemonic-${index}`);
                    
                    if (userWord === correctWord) {
                        input.classList.add('correct');
                        input.classList.remove('wrong');
                        mnemonicDiv.style.display = 'none'; // зӯ”е°ҚдёҚйЎҜзӨәжҸҗзӨә
                    } else {
                        input.classList.add('wrong');
                        input.classList.remove('correct');
                        mnemonicDiv.style.display = 'block'; // зӯ”йҢҜжҲ–з©әзҷҪйЎҜзӨәжҸҗзӨә
                    }
                });

            } else {
                // зӢҖж…Ӣпјҡйҡұи—Ҹзӯ”жЎҲ
                btn.innerHTML = 'йЎҜзӨәжүҖжңүзӯ”жЎҲ / жү№ж”№<br><span style="font-size:0.8em">г„’г„§г„ўЛҮ г„•ЛӢ г„үг„ҡЛҠ г„ўЛӢ</span>';
                btn.style.backgroundColor = '#d32f2f';
                
                answers.forEach(el => el.style.display = 'none');
                
                // е°ҮжҸҗзӨәйҡұи—Ҹиө·дҫҶ
                words.forEach((_, index) => {
                    document.getElementById(`p-mnemonic-${index}`).style.display = 'none';
                });
            }
        }


        /* --- иҖғи©ҰжЁЎејҸйӮҸијҜ --- */
        let currentQuestion = 0;
        let score = 0;
        let totalQuestions = words.length;
        let questions = [];
        let wrongWords = [];
        let isWaitingToContinue = false;

        function startGame(wordList) {
            let listToUse = words;
            if (wordList && Array.isArray(wordList) && wordList.length > 0) {
                listToUse = wordList;
            }
            
            questions = [...listToUse];
            totalQuestions = questions.length;
            shuffle(questions);
            currentQuestion = 0;
            score = 0;
            wrongWords = [];
            isWaitingToContinue = false;
            
            document.getElementById('exam-restart').style.display = 'none';
            document.getElementById('exam-retest').style.display = 'none';
            document.getElementById('wrong-words').textContent = '';
            document.getElementById('exam-answer').style.display = 'inline-block';
            document.getElementById('exam-submit').style.display = 'inline-block';
            document.getElementById('exam-submit').textContent = 'жҸҗдәӨ';
            document.getElementById('game-image').src = 'initial.png';
            document.getElementById('mnemonic').style.display = 'none';
            
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestion >= totalQuestions) {
                endGame();
                return;
            }
            
            const q = questions[currentQuestion];
            if (!q) return;

            const mnemonicEl = document.getElementById('mnemonic');
            mnemonicEl.textContent = '';
            mnemonicEl.style.display = 'none';

            isWaitingToContinue = false;
            document.getElementById('exam-submit').textContent = 'жҸҗдәӨ';
            
            document.getElementById('question').innerHTML = `ијёе…Ҙ <b>"${q.zh}"</b> зҡ„иӢұж–ҮжӢјеҜ«пјҡ`;
            document.getElementById('exam-answer').value = '';
            document.getElementById('exam-result').textContent = '';
            updateScore();
            
            setTimeout(() => {
                document.getElementById('exam-answer').focus();
            }, 50);
        }

        function checkExamAnswer() {
            if (isWaitingToContinue) {
                currentQuestion++;
                nextQuestion();
                return;
            }

            const userAnswer = document.getElementById('exam-answer').value.trim().toLowerCase();
            const q = questions[currentQuestion];
            const correctAnswer = q.en.toLowerCase();

            if (userAnswer === correctAnswer) {
                score++;
                document.getElementById('exam-result').textContent = 'жӯЈзўәпјҒ';
                document.getElementById('exam-result').style.color = 'green';
                document.getElementById('game-image').src = 'correct.png';
                setTimeout(() => {
                    currentQuestion++;
                    nextQuestion();
                }, 1500);
            } else {
                document.getElementById('exam-result').textContent = `йҢҜиӘӨгҖӮжӯЈзўәзӯ”жЎҲжҳҜпјҡ${q.en}`;
                document.getElementById('exam-result').style.color = 'red';
                document.getElementById('game-image').src = 'incorrect.png';
                
                const mnemonicEl = document.getElementById('mnemonic');
                mnemonicEl.innerHTML = `
                    рҹ’Ў <b>иЁҳжҶ¶жҸҗзӨәпјҡ</b>${q.mnemonic}
                    <br><br>
                    <button class="tts-btn" onclick="speakWord('${q.en}')">рҹ”Ҡ е”ёеҮәжӯЈзўәе–®еӯ—</button>
                `;
                mnemonicEl.style.display = 'block';
                
                document.getElementById('exam-submit').textContent = 'з№јзәҢ';
                wrongWords.push({ zh: q.zh, en: q.en, user: userAnswer, mnemonic: q.mnemonic });
                isWaitingToContinue = true;
            }
            updateScore();
        }

        function updateScore() {
            document.getElementById('score').textContent = `еҲҶж•ё: ${score} / ${totalQuestions}`;
        }

        function endGame() {
            document.getElementById('mnemonic').style.display = 'none';
            document.getElementById('question').textContent = 'жё¬й©—зөҗжқҹпјҒ';
            document.getElementById('exam-answer').style.display = 'none';
            document.getElementById('exam-submit').style.display = 'none';
            document.getElementById('exam-result').textContent = `дҪ зҡ„жңҖзөӮеҲҶж•ёпјҡ${score} / ${totalQuestions}`;
            
            if (score === totalQuestions) {
                document.getElementById('game-image').src = 'all_correct.png';
                document.getElementById('wrong-words').textContent = 'еӨӘжЈ’дәҶпјҒеҰіе…ЁйғЁзӯ”е°ҚпјҒ';
            } else {
                document.getElementById('game-image').src = 'not_all_correct.png';
                let wrongText = 'еҰізӯ”йҢҜзҡ„е–®еӯ—пјҡ\n';
                wrongWords.forEach(w => {
                    wrongText += `- ${w.zh}: жӯЈзўәзӯ”жЎҲжҳҜ "${w.en}"пјҢеҰіијёе…Ҙ "${w.user}"\n`;
                });
                document.getElementById('wrong-words').textContent = wrongText;
                document.getElementById('exam-retest').style.display = 'inline-block';
            }
            document.getElementById('exam-restart').style.display = 'inline-block';
        }

        // з¶Ғе®ҡиҖғи©ҰжЁЎејҸдәӢд»¶
        document.getElementById('exam-submit').addEventListener('click', checkExamAnswer);
        document.getElementById('exam-answer').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkExamAnswer();
        });
        document.getElementById('exam-restart').addEventListener('click', () => startGame(words));
        document.getElementById('exam-retest').addEventListener('click', () => {
            if (wrongWords.length > 0) {
                const retestWords = wrongWords.map(w => ({ en: w.en, zh: w.zh, mnemonic: w.mnemonic }));
                startGame(retestWords);
            }
        });

    </script>
</body>
</html>
