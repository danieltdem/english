<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自然科學挑戰：力與運動的奧秘</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
        }
        .intro {
            background-color: #e8f6f3;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #1abc9c;
            margin-bottom: 25px;
            font-weight: bold;
        }
        .question-block {
            margin-bottom: 30px;
            padding: 20px;
            background: #fdfefe;
            border: 1px solid #d5dbdb;
            border-radius: 10px;
            transition: transform 0.2s;
        }
        .question-block:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .question-title {
            font-size: 1.1em;
            font-weight: bold;
            color: #2980b9;
            margin-bottom: 15px;
        }
        .option-label {
            display: block;
            margin-bottom: 10px;
            cursor: pointer;
            padding: 8px;
            border-radius: 5px;
            transition: background 0.2s;
        }
        .option-label:hover {
            background-color: #ecf0f1;
        }
        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #e74c3c;
            color: white;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .submit-btn:hover {
            background-color: #c0392b;
        }
        .feedback {
            display: none;
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.95em;
        }
        .feedback.correct {
            background-color: #d4efdf;
            color: #196f3d;
            border: 1px solid #1e8449;
        }
        .feedback.incorrect {
            background-color: #fadbd8;
            color: #78281f;
            border: 1px solid #c0392b;
        }
        .explanation {
            margin-top: 10px;
            font-weight: normal;
            background: rgba(255,255,255,0.6);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>🔬 自然科學挑戰：力與運動之綜合分析</h1>
    <div class="intro">
        💡 測驗小提醒：本測驗為「高難度複選題」。每道題目皆有兩個或以上的正確選項，請務必將所有正確的選項都勾選出來喔！
    </div>

    <form id="quizForm">
        <div class="question-block" id="qb1">
            <div class="question-title">1. 關於「力的觀測與分類」，根據文本敘述，下列選項哪些是正確的？</div>
            <label class="option-label"><input type="checkbox" name="q1" value="A"> A. 力本身是不可見的，但我們能透過觀察物體形狀的改變來證明其存在。</label>
            <label class="option-label"><input type="checkbox" name="q1" value="B"> B. 游泳圈能浮於水面與大王蓮支撐重量，兩者在物理分類的力源上皆屬於「水力」的應用。</label>
            <label class="option-label"><input type="checkbox" name="q1" value="C"> C. 磁力與地球引力皆能使物體產生運動狀態的改變，例如磁鐵吸引迴紋針與失去支撐的物體掉落。</label>
            <label class="option-label"><input type="checkbox" name="q1" value="D"> D. 根據文本對動物「獸力」的描述，獸力僅能用來改變物體的位置（如載運物品），無法對環境或物體造成形狀或結構的改變。</label>
            <label class="option-label"><input type="checkbox" name="q1" value="E"> E. 攔截飛行中的飛盤使其停止，與彈撥彈珠使其由靜止開始滾動，兩者皆屬於力造成的「運動情形改變」。</label>
            <div class="feedback" id="fb1"></div>
        </div>

        <div class="question-block" id="qb2">
            <div class="question-title">2. 探討物體受力後的「形狀變化與可逆性」及「運動情形」，下列哪些觀念符合科學事實？</div>
            <label class="option-label"><input type="checkbox" name="q2" value="A"> A. 只要施加足夠的時間，任何原先具備彈性可恢復原狀的物體，最終皆會必然轉變為無法恢復的塑性變形。</label>
            <label class="option-label"><input type="checkbox" name="q2" value="B"> B. 捏塑油土與折彎鐵絲，皆屬於施力停止後無法自動恢復原狀的「塑性變形」。</label>
            <label class="option-label"><input type="checkbox" name="q2" value="C"> C. 橡皮筋具有極佳的彈性，因此無論受到多大的拉力或拉扯多久，皆能完全恢復原狀，屬於絕對可逆的作用。</label>
            <label class="option-label"><input type="checkbox" name="q2" value="D"> D. 將色紙撕開與折斷粉筆，這兩者在物理現象的分類中，皆屬於「結構破壞」且為不可逆的狀態。</label>
            <label class="option-label"><input type="checkbox" name="q2" value="E"> E. 當強風吹動風車時，除了產生運動狀態的改變（使扇葉轉動），也可能同時造成扇葉形狀的微小改變（連帶效應）。</label>
            <div class="feedback" id="fb2"></div>
        </div>

        <div class="question-block" id="qb3">
            <div class="question-title">3. 關於「力的測量」與「科學表示法」，下列敘述哪些是正確的？</div>
            <label class="option-label"><input type="checkbox" name="q3" value="A"> A. 為了精確描述力，需要標示力的三要素，其中「作用點」是以箭頭尾端的圓點來代表施力接觸物體的位置。</label>
            <label class="option-label"><input type="checkbox" name="q3" value="B"> B. 在力的科學符號表示法中，箭頭線段的長短可以用來表示力的大小，線段愈長代表力愈大。</label>
            <label class="option-label"><input type="checkbox" name="q3" value="C"> C. 橡皮筋效應的實驗結果證明，橡皮筋的伸長量與吊掛重物的重量成反比例關係。</label>
            <label class="option-label"><input type="checkbox" name="q3" value="D"> D. 透過測量具彈性物體受力後的形變程度（例如觀察橡皮筋長度的變化），我們可以將力的大小進行客觀的定量表示。</label>
            <label class="option-label"><input type="checkbox" name="q3" value="E"> E. 力的「方向」只能透過觀察物體形狀改變的延伸路徑來主觀判斷，無法在圖形上用科學符號明確標示。</label>
            <div class="feedback" id="fb3"></div>
        </div>

        <div class="question-block" id="qb4">
            <div class="question-title">4. 在「動力傳送媒介與應用」領域，依據文本所述，下列哪些原理解析與應用實例配對正確？</div>
            <label class="option-label"><input type="checkbox" name="q4" value="A"> A. 吹箭與落葉吹風機，皆是利用「氣體」作為動力傳送的媒介來達成特定的工作目的。</label>
            <label class="option-label"><input type="checkbox" name="q4" value="B"> B. 液壓千斤頂是依據「阿基米德原理」，透過油作為液體媒介，使小活塞處的施力在大活塞處放大推力。</label>
            <label class="option-label"><input type="checkbox" name="q4" value="C"> C. 牛頓擺展現了「固體傳送」動力的現象，動力能夠穿過中間緊密排列的球體，使另一端的球體彈出。</label>
            <label class="option-label"><input type="checkbox" name="q4" value="D"> D. 荷蘭藝術家泰奧·揚生發明的「風力仿生獸」，其動力傳輸路徑是先由機器腳部產生動力，再逆向傳送至扇葉使其轉動。</label>
            <label class="option-label"><input type="checkbox" name="q4" value="E"> E. 在兩個連通的注射器實驗中，若向下壓 A 活塞，動力會經由內部液體的壓力傳送，導致 B 活塞向上移動。</label>
            <div class="feedback" id="fb4"></div>
        </div>

        <button type="button" class="submit-btn" onclick="checkAnswers()">送出答案看解析</button>
    </form>
</div>

<script>
    function checkAnswers() {
        // 定義標準答案與解析
        const answers = {
            q1: { 
                correct: ['A', 'C', 'E'], 
                exp: "B錯誤：游泳圈與大王蓮皆屬於「浮力」的應用，而非水力（水力為推動水車等）。D錯誤：狗挖洞即屬於獸力改變地表結構形狀的例子。" 
            },
            q2: { 
                correct: ['B', 'D', 'E'], 
                exp: "A錯誤：並非「任何」物體都會必然轉變，而是「施力過大或持續時間過長」才有損壞或改變的可能。C錯誤：橡皮筋存在臨界點限制，過度或長期拉扯會斷裂或鬆弛。" 
            },
            q3: { 
                correct: ['A', 'B', 'D'], 
                exp: "C錯誤：橡皮筋伸長量與重物重量成「正比」（吊掛數量越多，長度越長）。E錯誤：力的方向可以直接用箭頭指向的方向來明確表示。" 
            },
            q4: { 
                correct: ['A', 'C', 'E'], 
                exp: "B錯誤：液壓千斤頂是依據「帕斯卡原理」，而非阿基米德原理。D錯誤：風力仿生獸是風吹動扇葉後，將動力傳送到「腳部」，方向顛倒了。" 
            }
        };

        for (let i = 1; i <= 4; i++) {
            let qName = 'q' + i;
            let selected = Array.from(document.querySelectorAll(`input[name="${qName}"]:checked`)).map(cb => cb.value);
            let correct = answers[qName].correct;
            
            // 判斷是否全對（無漏選、無錯選）
            let isCorrect = selected.length === correct.length && selected.every(val => correct.includes(val));
            let feedbackDiv = document.getElementById('fb' + i);
            
            feedbackDiv.style.display = 'block';
            if (isCorrect) {
                feedbackDiv.className = 'feedback correct';
                feedbackDiv.innerHTML = `<strong>✔️ 答對了！</strong> 恭喜您完全掌握本題重點。`;
            } else {
                feedbackDiv.className = 'feedback incorrect';
                feedbackDiv.innerHTML = `<strong>❌ 答錯囉！或者有漏選。</strong> 正確解答為：${correct.join(', ')}。<br><div class="explanation">💡 <strong>小幫手解析：</strong>${answers[qName].exp}</div>`;
            }
        }
    }
</script>

</body>
</html>
