<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字拼寫遊戲 & 練習</title>
    <style>
        /* 全局設定 */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
            transition: background-color 0.5s;
        }

        /* 通用容器樣式 */
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 650px;
            max-height: 90vh;
            position: relative;
            overflow-y: auto; 
        }

        h1 { margin-top: 0; }
        
        .game-image {
            width: 100%;
            max-width: 300px;
            height: auto;
            object-fit: contain;
            margin-bottom: 15px;
        }

        /* 按鈕通用樣式 */
        button {
            padding: 12px 24px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.1s, background-color 0.3s;
        }
        button:active { transform: scale(0.95); }

        .speech-btn {
            background-color: #2196F3;
            color: white;
            padding: 6px 12px;
            font-size: 14px;
            margin: 0 0 0 10px;
            border-radius: 5px;
            display: inline-flex;
            align-items: center;
        }
        .speech-btn:hover { background-color: #0b7dda; }

        /* --- 首頁選單樣式 --- */
        #menu-screen { display: block; }
        .menu-btn {
            display: block;
            width: 80%;
            margin: 15px auto;
            background-color: #ff9800;
            color: white;
            font-weight: bold;
        }
        .menu-btn:hover { background-color: #e68900; }
        .ruby-text { font-size: 0.8em; display: block; margin-bottom: 2px; }

        /* --- 考試模式樣式 --- */
        #exam-screen { display: none; }
        .exam-input {
            padding: 10px;
            font-size: 18px;
            width: 70%;
            margin-bottom: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
        }
        .exam-btn { background-color: #4CAF50; color: white; }
        .exam-btn:hover { background-color: #45a049; }
        
        #mnemonic {
            font-size: 16px;
            margin-top: 10px;
            color: #3d5afe;
            text-align: left;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            background-color: #f3f4ff;
            line-height: 1.5;
        }
        #wrong-words { text-align: left; white-space: pre-wrap; margin-top: 20px;}

        /* --- 練習模式樣式 --- */
        #practice-screen { 
            display: none; 
            background-color: #2c2c2c;
            color: #f0f0f0;
            border: 4px solid #8b4513;
            flex-direction: column; 
            padding: 0; 
            overflow: hidden; 
        }
        
        body.practice-mode { background-color: #1a1a1a; }

        .practice-fixed-top {
            background-color: #2c2c2c;
            padding: 15px 20px 5px 20px;
            border-bottom: 2px solid #555;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            flex-shrink: 0;
            z-index: 10;
        }

        .top-btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        #practice-list-container {
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 10px 20px 20px 20px;
            scrollbar-width: thin;
            scrollbar-color: #555 #2c2c2c;
        }
        
        #practice-list-container::-webkit-scrollbar { width: 8px; }
        #practice-list-container::-webkit-scrollbar-track { background: #2c2c2c; }
        #practice-list-container::-webkit-scrollbar-thumb { background-color: #555; border-radius: 4px; }

        .practice-item {
            border-bottom: 1px solid #444;
            padding: 12px 0;
            display: flex;
            flex-direction: column;
        }
        
        .practice-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .practice-mnemonic-box {
            background-color: #3a2a2a;
            border-left: 4px solid #f44336;
            padding: 10px;
            margin-top: 10px;
            font-size: 15px;
            color: #ffd1d1;
            text-align: left;
            border-radius: 0 4px 4px 0;
            display: none;
        }

        .col-zh { width: 35%; text-align: left; font-size: 16px; color: #ffcc00; }
        .col-input { width: 40%; }
        .col-ans { width: 25%; text-align: right; color: #4CAF50; font-weight: bold; font-size: 18px;}

        .practice-input {
            width: 90%;
            padding: 8px;
            font-size: 16px;
            background-color: #444;
            color: white;
            border: 2px solid #666;
            border-radius: 5px;
        }
        .practice-input.correct { border-color: #4CAF50; background-color: #2e4a2e; }
        .practice-input.wrong { border-color: #f44336; background-color: #4a2e2e; }

        .global-toggle-btn {
            background-color: #d32f2f;
            color: white;
            width: 100%;
            margin: 0;
            font-weight: bold;
            font-size: 16px;
            padding: 10px;
        }
        .global-toggle-btn:hover { background-color: #b71c1c; }

        .header-back-btn {
            background-color: #607d8b;
            color: white;
            width: 30%; 
            margin: 0;
            font-size: 14px;
            padding: 10px;
        }

        .answer-text { display: none; }
        
        .list-header {
            display: flex; 
            justify-content: space-between; 
            color: #aaa; 
            font-size: 14px; 
            margin-top: 10px;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>

    <div id="menu-screen" class="container">
        <img src="initial.png" alt="Menu" class="game-image">
        <h1>英文單字挑戰</h1>
        <p>寧寧，請選擇模式：</p>
        
        <button class="menu-btn" onclick="goToExam()">
            <span class="ruby-text">ㄎㄞ ㄕˇ ㄎㄠˇ ㄕˋ</span>
            開始考試
        </button>

        <button class="menu-btn" onclick="goToPractice()">
            <span class="ruby-text">ㄨㄛˇ ㄧㄠˋ ㄌㄧㄢˋ ㄒㄧˊ</span>
            我要練習
        </button>
    </div>

    <div id="exam-screen" class="container">
        <img id="game-image" src="initial.png" alt="Game Scene" class="game-image">
        <h1>單字拼寫測驗</h1>
        <p>請根據給出的中文意思，輸入正確的英文拼寫。共52題，順序隨機。</p>
        <div id="question" style="font-size: 24px; margin: 20px 0;"></div>
        <input type="text" id="exam-answer" class="exam-input" placeholder="輸入英文拼寫" autocomplete="off">
        <br>
        <button id="exam-submit" class="exam-btn">提交</button>
        <div id="exam-result" style="font-size: 20px; margin-top: 20px;"></div>
        <div id="mnemonic" style="display: none;"></div>
        <div id="score" style="font-size: 18px; margin-top: 10px;">分數: 0 / 0</div>
        <div id="wrong-words"></div>
        <button id="exam-restart" class="exam-btn" style="display: none;">重新開始</button>
        <button id="exam-retest" class="exam-btn" style="display: none;">重測錯題</button>
        <button class="menu-btn" style="background-color:#607d8b; width: 60%; margin-top: 20px;" onclick="goHome()">回首頁</button>
    </div>

    <div id="practice-screen" class="container">
        <div class="practice-fixed-top">
            <h2 style="color: #ff9800; margin: 0 0 10px 0;">單字練習室</h2>
            <div class="top-btn-group">
                <button class="header-back-btn" onclick="goHome()">
                    回首頁<br><span style="font-size:0.8em">ㄏㄨㄟˊ ㄕㄡˇ ㄧㄝˋ</span>
                </button>
                <button id="toggle-all-btn" class="global-toggle-btn" style="width: 70%;" onclick="toggleAllAnswers()">
                    顯示所有答案 / 批改
                    <br><span style="font-size:0.8em">ㄒㄧㄢˇ ㄕˋ ㄉㄚˊ ㄢˋ</span>
                </button>
            </div>
            <div class="list-header">
                <span style="width:35%">中文意思</span>
                <span style="width:40%">拼寫練習</span>
                <span style="width:25%; text-align:right;">正確答案</span>
            </div>
        </div>
        
        <div id="practice-list-container">
            <div id="practice-list"></div>
        </div>
    </div>

    <script>
        // 內建 Web Speech API 語音合成發音功能
        function speakWord(word) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US'; 
                utterance.rate = 0.9; // 稍微放慢一點速度
                window.speechSynthesis.speak(utterance);
            } else {
                alert("抱歉，您的瀏覽器不支援發音功能喔！");
            }
        }

        // 整理過後的52個單字題庫
        const words = [
            { en: 'except', zh: '除了 (ㄔㄨˊ ㄌㄜ˙)', mnemonic: '`ex` (出去) + `cept` (拿取)。從一群東西中把它拿出去排除掉，就是「除了」。' },
            { en: 'stretch', zh: '伸展 (ㄕㄣ ㄓㄢˇ)', mnemonic: '`stretch` 聽起來像 `stress` (壓力)。當你感到壓力 (stress) 時，就會想伸展 (stretch) 一下筋骨。' },
            { en: 'German', zh: '德國人/德語 (ㄉㄜˊ ㄍㄨㄛˊ ㄖㄣˊ)', mnemonic: '聯想 `germ` (細菌) + `man` (人)。這是一個純發音聯想的記憶法。' },
            { en: 'contrast', zh: '對比 (ㄉㄨㄟˋ ㄅㄧˇ)', mnemonic: '`contra` (相反的) + `st` (street 街道)。兩條方向完全相反的街道，形成強烈的「對比」。' },
            { en: 'indicate', zh: '指出 (ㄓˇ ㄔㄨ)', mnemonic: '`in` + `dictate` (口述)。在口述之中用手指「指出」重點。' },
            { en: 'fetch', zh: '拿來 (ㄋㄚˊ ㄌㄞˊ)', mnemonic: '聽起來像 `fat catch` (胖子抓住)。那個胖子迅速抓取並把東西「拿來」了。' },
            { en: 'treat', zh: '對待/請客 (ㄉㄨㄟˋ ㄉㄞˋ / ㄑㄧㄥˇ ㄎㄜˋ)', mnemonic: '裡面有 `eat` (吃)。我請客 (treat)，我們一起去吃 (eat) 大餐！' },
            { en: 'develop', zh: '發展 (ㄈㄚ ㄓㄢˇ)', mnemonic: '`de` + `velop` (envelope 信封)。打開信封，讓裡面的企劃開始「發展」。' },
            { en: 'harsh', zh: '嚴厲的 (ㄧㄢˊ ㄌㄧˋ ㄉㄜ˙)', mnemonic: '聽起來像 `hard` (堅硬/困難) + `sh`。態度非常堅硬，就是「嚴厲的」。' },
            { en: 'supply', zh: '供應 (ㄍㄨㄥ ㄧㄥˋ)', mnemonic: '`sup` (在下面) + `ply` (折疊)。物資從下面源源不絕地折疊送上來，就是「供應」。' },
            { en: 'bring', zh: '帶來 (ㄉㄞˋ ㄌㄞˊ)', mnemonic: '`b` + `ring` (戒指)。那個男孩「帶來」(bring) 了一枚戒指 (ring) 要求婚。' },
            { en: 'growth', zh: '成長 (ㄔㄥˊ ㄓㄤˇ)', mnemonic: '`grow` (生長) + `th` (名詞字尾)。由生長這個動詞變來的名詞就是「成長」。' },
            { en: 'wreck', zh: '殘骸 (ㄘㄢˊ ㄏㄞˊ)', mnemonic: '聽起來像 `break` (打破)。東西被打破 (break) 之後，就變成了「殘骸」(wreck)。' },
            { en: 'express', zh: '表達 (ㄅㄧㄠˇ ㄉㄚˊ)', mnemonic: '`ex` (向外) + `press` (擠壓)。把心裡的想法向外擠壓出來，就是「表達」。' },
            { en: 'clutch', zh: '緊握 (ㄐㄧㄣˇ ㄨㄛˋ)', mnemonic: '聽起來和意思都像 `catch` (抓住)。緊緊地抓住不放，就是「緊握」。' },
            { en: 'visualize', zh: '想像/視覺化 (ㄒㄧㄤˇ ㄒㄧㄤˋ)', mnemonic: '`visual` (視覺的) + `ize` (使...)。使畫面在腦海中呈現視覺，就是「想像」。' },
            { en: 'brief', zh: '簡短的 (ㄐㄧㄢˇ ㄉㄨㄢˇ ㄉㄜ˙)', mnemonic: '聯想 `briefcase` (公事包)。公事包裡裝的通常是「簡短的」會議摘要。' },
            { en: 'handle', zh: '處理 (ㄔㄨˇ ㄌㄧˇ)', mnemonic: '`hand` (手) + `le`。用你的手 (hand) 去親自「處理」這件事情。' },
            { en: 'twitch', zh: '抽搐 (ㄔㄡ ㄔㄨˋ)', mnemonic: '聽起來像 `witch` (女巫)。女巫 (witch) 施法讓那個人全身「抽搐」(twitch)。' },
            { en: 'notice', zh: '注意到 (ㄓㄨˋ ㄧˋ ㄉㄠˋ)', mnemonic: '`no` (沒有) + `ice` (冰)。請「注意」！這裡沒有 (no) 冰 (ice) 了！' },
            { en: 'sketch', zh: '素描 (ㄙㄨˋ ㄇㄧㄠˊ)', mnemonic: '`skill` (技巧) + `etch` (雕刻)。用繪畫技巧畫出來的草圖就是「素描」。' },
            { en: 'quite', zh: '相當 (ㄒㄧㄤ ㄉㄤ)', mnemonic: '跟 `quiet` (安靜) 長得很像。這個圖書館「相當」(quite) 安靜 (quiet)。' },
            { en: 'arrest', zh: '逮捕 (ㄉㄞˋ ㄅㄨˇ)', mnemonic: '`a` + `rest` (休息)。警察讓逃跑的小偷停下來休息 (rest)，也就是被「逮捕」了。' },
            { en: 'humor', zh: '幽默 (ㄧㄡ ㄇㄛˋ)', mnemonic: '聯想 `human` (人類)。懂得「幽默」(humor) 是人類 (human) 特有的天賦。' },
            { en: 'unique', zh: '獨特的 (ㄉㄨˊ ㄊㄜˋ ㄉㄜ˙)', mnemonic: '字首 `uni` 代表「單一」。世界上只有單一一個，當然是「獨特的」。' },
            { en: 'troop', zh: '軍隊 (ㄐㄩㄣ ㄉㄨㄟˋ)', mnemonic: '聽起來像 `group` (團體)。「軍隊」(troop) 本身就是一個戰鬥團體 (group)。' },
            { en: 'chore', zh: '家事/雜務 (ㄐㄧㄚ ㄕˋ)', mnemonic: '聽起來像 `bore` (令人無聊的事)。做家事 (chore) 常常是一件無聊的事 (bore)。' },
            { en: 'expert', zh: '專家 (ㄓㄨㄢ ㄐㄧㄚ)', mnemonic: '`ex` (出) + `per` (全部/完美)。在所有領域中表現最突出的，就是「專家」。' },
            { en: 'order', zh: '點餐/命令 (ㄉㄧㄢˇ ㄘㄢ)', mnemonic: '去餐廳一定會聽到服務生問 May I take your order? (我可以為您點餐嗎？)' },
            { en: 'truce', zh: '休戰 (ㄒㄧㄡ ㄓㄢˋ)', mnemonic: '聽起來像 `true` (真實的)。雙方達成真實的 (true) 和平，也就是「休戰」(truce)。' },
            { en: 'field', zh: '領域/田野 (ㄌㄧㄥˇ ㄩˋ)', mnemonic: '聽起來像 `filled` (填滿)。這片田野 (field) 裡被農作物給填滿 (filled) 了。' },
            { en: 'support', zh: '支持 (ㄓ ㄔˊ)', mnemonic: '`sup` (在下面) + `port` (支撐)。在別人的下面給予支撐，就是「支持」。' },
            { en: 'although', zh: '雖然 (ㄙㄨㄟ ㄖㄢˊ)', mnemonic: '`all` (全部) + `though` (即使)。全部加起來「雖然」是這樣，但...。' },
            { en: 'record', zh: '記錄 (ㄐㄧˋ ㄌㄨˋ)', mnemonic: '`re` (再) + `cord` (繩子)。古人利用繩子打結 (cord) 來一再地「記錄」事情。' },
            { en: 'landform', zh: '地形 (ㄉㄧˋ ㄒㄧㄥˊ)', mnemonic: '`land` (土地) + `form` (形狀)。土地所呈現的形狀，就是「地形」。' },
            { en: 'fourteen', zh: '十四 (ㄕˊ ㄙˋ)', mnemonic: '`four` (四) + `teen` (十的字尾)。十加四就是十四。' },
            { en: 'truly', zh: '真正地 (ㄓㄣ ㄓㄥˋ ㄉㄧˋ)', mnemonic: '`true` (真實的) + `ly` (副詞字尾)。去了 e 加上 ly，就是「真正地」。' },
            { en: 'port', zh: '港口 (ㄍㄤˇ ㄎㄡˇ)', mnemonic: '聯想 `import` (進口)。進口貨物船隻停泊的地方就是「港口」。' },
            { en: 'lay', zh: '放置 (ㄈㄤˋ ㄓˋ)', mnemonic: '和 `play` (玩) 押韻。玩 (play) 完玩具後，要把它整齊地「放置」(lay) 好。' },
            { en: 'control', zh: '控制 (ㄎㄨㄥˋ ㄓˋ)', mnemonic: '`con` (一起) + `roll` (滾動)。雙手一起轉動方向盤，就是在「控制」車子。' },
            { en: 'focus', zh: '專注 (ㄓㄨㄢ ㄓㄨˋ)', mnemonic: '`F`orgetting `O`ther `C`ares, `U` `S`ee? (忘掉其他煩惱，你懂嗎？) 這就是專注。' },
            { en: 'desire', zh: '渴望 (ㄎㄜˇ ㄨㄤˋ)', mnemonic: '`de` (加強) + `sire` (siren 賽倫海妖)。像聽到海妖唱歌一樣讓人極度「渴望」。' },
            { en: 'spring', zh: '春天/彈簧 (ㄔㄨㄣ ㄊㄧㄢ)', mnemonic: '到了春天，萬物就像彈簧 (spring) 一樣迅速跳出來生長。' },
            { en: 'grand', zh: '宏偉的 (ㄏㄨㄥˊ ㄨㄟˇ ㄉㄜ˙)', mnemonic: '聯想 `grandfather` (爺爺)。在家中地位最宏偉 (grand)、最德高望重的就是爺爺。' },
            { en: 'market', zh: '市場 (ㄕˋ ㄔㄤˇ)', mnemonic: '`mark` (標記) + `et`。在每一件商品上標記 (mark) 價格的地方就是「市場」。' },
            { en: 'avoid', zh: '避免 (ㄅㄧˋ ㄇㄧㄢˇ)', mnemonic: '`a` + `void` (空無)。把危險化為空無 (void)，就是「避免」了災難。' },
            { en: 'lab', zh: '實驗室 (ㄕˊ ㄧㄢˋ ㄕˋ)', mnemonic: '這是 `laboratory` (實驗室) 的常見縮寫，唸法也最簡短！' },
            { en: 'hardly', zh: '幾乎不 (ㄐㄧ ㄏㄨ ㄅㄨˋ)', mnemonic: '`hard` (困難) + `ly`。這件事困難 (hard) 到讓你「幾乎不」會想去做。' },
            { en: 'general', zh: '一般的/將軍 (ㄧˋ ㄅㄢ ㄉㄜ˙)', mnemonic: '將軍 (general) 其實平時也要管很多「一般的」(general) 軍中瑣事。' },
            { en: 'usually', zh: '通常 (ㄊㄨㄥ ㄔㄤˊ)', mnemonic: '`usual` (平常的) + `ly`。由平常的加上副詞字尾，變成「通常」。' },
            { en: 'anyway', zh: '無論如何 (ㄨˊ ㄌㄨㄣˋ ㄖㄨˊ ㄏㄜˊ)', mnemonic: '`any` (任何) + `way` (方法)。用任何方法都要完成，也就是「無論如何」。' },
            { en: 'eastern', zh: '東方的 (ㄉㄨㄥ ㄈㄤ ㄉㄜ˙)', mnemonic: '`east` (東) + `ern` (形容詞字尾)。加上字尾就變成了「東方的」。' }
        ];

        /* --- 頁面切換 --- */
        function goHome() {
            document.getElementById('menu-screen').style.display = 'block';
            document.getElementById('exam-screen').style.display = 'none';
            document.getElementById('practice-screen').style.display = 'none'; 
            document.body.classList.remove('practice-mode');
        }

        function goToExam() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('exam-screen').style.display = 'block';
            document.getElementById('practice-screen').style.display = 'none';
            document.body.classList.remove('practice-mode');
            startExam();
        }

        function goToPractice() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('exam-screen').style.display = 'none';
            document.getElementById('practice-screen').style.display = 'flex'; 
            document.body.classList.add('practice-mode');
            renderPracticeList(); 
            resetPracticeState(); 
        }

        /* --- 練習模式 --- */
        let areAnswersVisible = false;

        function resetPracticeState() {
            areAnswersVisible = false;
            const btn = document.getElementById('toggle-all-btn');
            btn.innerHTML = '顯示所有答案 / 批改<br><span style="font-size:0.8em">ㄒㄧㄢˇ ㄕˋ ㄉㄚˊ ㄢˋ</span>';
            btn.style.backgroundColor = '#d32f2f'; 
        }

        function renderPracticeList() {
            const listContainer = document.getElementById('practice-list');
            listContainer.innerHTML = ''; 

            words.forEach((word, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'practice-item';
                
                // 替換單字中的單引號，防止傳遞到函數時出錯
                const safeWordEn = word.en.replace(/'/g, "\\'");

                itemDiv.innerHTML = `
                    <div class="practice-row">
                        <div class="col-zh">${word.zh}</div>
                        <div class="col-input">
                            <input type="text" class="practice-input" id="p-input-${index}" placeholder="拼寫..." autocomplete="off">
                        </div>
                        <div class="col-ans">
                            <div id="ans-${index}" class="answer-text">${word.en}</div>
                        </div>
                    </div>
                    <div id="p-mnemonic-${index}" class="practice-mnemonic-box">
                        💡 <b>記憶提示：</b>${word.mnemonic}
                        <button class="speech-btn" onclick="speakWord('${safeWordEn}')">🔊 唸出單字</button>
                    </div>
                `;
                listContainer.appendChild(itemDiv);
            });
        }

        // 綁定事件委派，監聽整個區塊內的 Enter 鍵
        document.getElementById('practice-list-container').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                toggleAllAnswers();
            }
        });

        function toggleAllAnswers() {
            const btn = document.getElementById('toggle-all-btn');
            const answers = document.querySelectorAll('.answer-text');
            const inputs = document.querySelectorAll('.practice-input');

            areAnswersVisible = !areAnswersVisible;

            if (areAnswersVisible) {
                // 顯示答案與批改
                btn.innerHTML = '隱藏所有答案<br><span style="font-size:0.8em">ㄧㄣˇ ㄘㄤˊ ㄉㄚˊ ㄢˋ</span>';
                btn.style.backgroundColor = '#4CAF50'; 
                
                answers.forEach(el => el.style.display = 'block');

                inputs.forEach((input, index) => {
                    const userWord = input.value.trim().toLowerCase();
                    const correctWord = words[index].en.toLowerCase();
                    const mnemonicBox = document.getElementById(`p-mnemonic-${index}`);
                    
                    if (userWord === correctWord) {
                        input.classList.add('correct');
                        input.classList.remove('wrong');
                        mnemonicBox.style.display = 'none'; // 答對不顯示提示
                    } else {
                        // 答錯或是留白
                        input.classList.add('wrong');
                        input.classList.remove('correct');
                        mnemonicBox.style.display = 'block'; // 答錯顯示提示與發音按鈕
                    }
                });
            } else {
                // 隱藏答案
                btn.innerHTML = '顯示所有答案 / 批改<br><span style="font-size:0.8em">ㄒㄧㄢˇ ㄕˋ ㄉㄚˊ ㄢˋ</span>';
                btn.style.backgroundColor = '#d32f2f'; 
                
                answers.forEach(el => el.style.display = 'none');
                // 隱藏所有的記憶提示框
                document.querySelectorAll('.practice-mnemonic-box').forEach(el => el.style.display = 'none');
            }
        }


        /* --- 考試模式 --- */
        let currentQuestion = 0;
        let score = 0;
        let totalQuestions = words.length;
        let questions = [];
        let wrongWords = [];
        let isWaitingToContinue = false;

        function startExam(wordList = words) {
            questions = [...wordList];
            totalQuestions = questions.length;
            shuffle(questions);
            currentQuestion = 0;
            score = 0;
            wrongWords = [];
            isWaitingToContinue = false;
            
            document.getElementById('exam-restart').style.display = 'none';
            document.getElementById('exam-retest').style.display = 'none';
            document.getElementById('wrong-words').textContent = '';
            document.getElementById('exam-answer').style.display = 'inline-block';
            document.getElementById('exam-submit').style.display = 'inline-block';
            document.getElementById('exam-submit').textContent = '提交';
            document.getElementById('game-image').src = 'initial.png';
            document.getElementById('mnemonic').style.display = 'none';
            
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestion >= totalQuestions) {
                endExam();
                return;
            }
            const mnemonicEl = document.getElementById('mnemonic');
            mnemonicEl.textContent = '';
            mnemonicEl.style.display = 'none';

            isWaitingToContinue = false;
            document.getElementById('exam-submit').textContent = '提交';
            const q = questions[currentQuestion];
            document.getElementById('question').textContent = `輸入 "${q.zh}" 的英文拼寫：`;
            document.getElementById('exam-answer').value = '';
            document.getElementById('exam-result').textContent = '';
            updateScore();
        }

        function checkExamAnswer() {
            if (isWaitingToContinue) {
                currentQuestion++;
                nextQuestion();
                return;
            }

            const userAnswer = document.getElementById('exam-answer').value.trim().toLowerCase();
            const q = questions[currentQuestion];
            const correctAnswer = q.en.toLowerCase();

            if (userAnswer === correctAnswer) {
                score++;
                document.getElementById('exam-result').textContent = '正確！';
                document.getElementById('exam-result').style.color = 'green';
                document.getElementById('game-image').src = 'correct.png';
                setTimeout(() => {
                    currentQuestion++;
                    nextQuestion();
                }, 1500);
            } else {
                document.getElementById('exam-result').textContent = `錯誤。正確答案是：${q.en}`;
                document.getElementById('exam-result').style.color = 'red';
                document.getElementById('game-image').src = 'incorrect.png';
                
                const safeWordEn = q.en.replace(/'/g, "\\'");
                const mnemonicEl = document.getElementById('mnemonic');
                mnemonicEl.innerHTML = `
                    💡 <b>記憶提示：</b>${q.mnemonic}
                    <br><br>
                    <button class="speech-btn" style="margin-left:0;" onclick="speakWord('${safeWordEn}')">🔊 唸出單字</button>
                `;
                mnemonicEl.style.display = 'block';
                
                document.getElementById('exam-submit').textContent = '繼續';
                wrongWords.push({ zh: q.zh, en: q.en, user: userAnswer, mnemonic: q.mnemonic });
                isWaitingToContinue = true;
            }
            updateScore();
        }

        function updateScore() {
            document.getElementById('score').textContent = `分數: ${score} / ${totalQuestions}`;
        }

        function endExam() {
            document.getElementById('mnemonic').style.display = 'none';
            document.getElementById('question').textContent = '測驗結束！';
            document.getElementById('exam-answer').style.display = 'none';
            document.getElementById('exam-submit').style.display = 'none';
            document.getElementById('exam-result').textContent = `你的最終分數：${score} / ${totalQuestions}`;
            
            if (score === totalQuestions) {
                document.getElementById('game-image').src = 'all_correct.png';
                document.getElementById('wrong-words').textContent = '太棒了！你全部答對！';
            } else {
                document.getElementById('game-image').src = 'not_all_correct.png';
                let wrongText = '你答錯的單字：\n';
                wrongWords.forEach(w => {
                    wrongText += `- ${w.zh}: 正確答案是 "${w.en}"，你輸入 "${w.user}"\n`;
                });
                document.getElementById('wrong-words').textContent = wrongText;
                document.getElementById('exam-retest').style.display = 'inline-block';
            }
            document.getElementById('exam-restart').style.display = 'inline-block';
        }

        document.getElementById('exam-submit').addEventListener('click', checkExamAnswer);
        document.getElementById('exam-answer').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkExamAnswer();
        });
        document.getElementById('exam-restart').addEventListener('click', () => startExam(words));
        document.getElementById('exam-retest').addEventListener('click', () => {
            if (wrongWords.length > 0) {
                const retestWords = wrongWords.map(w => ({ en: w.en, zh: w.zh, mnemonic: w.mnemonic }));
                startExam(retestWords);
            }
        });

    </script>
</body>
</html>
