    <script>
        // е–®еӯ—еә«
        const words = [
            { en: 'multiple', zh: 'еӨҡеҖӢзҡ„ (г„үг„Ёг„ӣ г„Қг„ңЛӢ г„үг„ңЛҷ)', mnemonic: '`multi` (еӨҡеҖӢ) + `ple`гҖӮжғіеғҸжңүеҫҲеӨҡ (`multi`) иҳӢжһң (apple -> `ple`)гҖӮ' },
            { en: 'scribble', zh: 'еЎ—йҙүпјӣдәӮеҜ« (г„Ҡг„ЁЛҠ г„§г„ҡпјӣг„Ңг„Ёг„ўЛӢ г„’г„§г„қЛҮ)', mnemonic: '`scribble` иҒҪиө·дҫҶеғҸ `scrabble` (жӢјеӯ—йҒҠжҲІ)гҖӮеңЁзҺ©жӢјеӯ—йҒҠжҲІжҷӮеңЁзҙҷдёҠдәӮеҜ« (`scribble`)гҖӮ' },
            { en: 'groan', zh: 'е‘»еҗҹ (г„•г„Ј г„§г„ЈЛҠ)', mnemonic: '`groan` (е‘»еҗҹ) иҒҪиө·дҫҶеғҸ `grown` (й•·еӨ§зҡ„)гҖӮй•·еӨ§ (`grown`) еҫҢдјҙйҡЁи‘—иЁұеӨҡз—ӣиӢҰзҡ„е‘»еҗҹ (`groan`)гҖӮ' },
            { en: 'screech', zh: 'е°–еҸ«иҒІ (г„җг„§г„ў г„җг„§г„ ЛӢ г„•г„Ҙ)', mnemonic: '`screech` иЈЎжңү `scree` (иҒҪиө·дҫҶеғҸ screamпјҢе°–еҸ«)гҖӮзҷјеҮәеғҸз…һи»ҠдёҖжЁЈеҲәиҖізҡ„е°–еҸ«иҒІ (`screech`)гҖӮ' },
            { en: 'among', zh: 'еңЁ...д№Ӣдёӯ (г„—г„һЛӢ...г„“ г„“г„Ёг„Ҙ)', mnemonic: '`a` + `mong` (monkey, зҢҙеӯҗ)гҖӮдёҖйҡ»зҢ©зҢ©ж··еңЁзҢҙеӯҗ (`monkey`) д№Ӣдёӯ (`among`)гҖӮ' },
            { en: 'source', zh: 'дҫҶжәҗ (г„Ңг„һЛҠ г„©г„ўЛҠ)', mnemonic: '`source` (дҫҶжәҗ) иҒҪиө·дҫҶеғҸ `sauce` (йҶ¬жұҒ)гҖӮйҖҷзЁ®зҫҺе‘ійҶ¬жұҒ (`sauce`) зҡ„дҫҶжәҗ (`source`) жҳҜдёҖеҖӢз§ҳеҜҶгҖӮ' },
            { en: 'negative', zh: 'иІ йқўзҡ„ (г„Ҳг„ЁЛӢ г„Үг„§г„ўЛӢ г„үг„ңЛҷ)', mnemonic: '`nega` иҒҪиө·дҫҶеғҸ `neglect` (еҝҪз•Ҙ)гҖӮдёҚиҰҒеҝҪз•ҘйӮЈдәӣиІ йқўзҡ„ (`negative`) жғ…з·’гҖӮ' },
            { en: 'rearrange', zh: 'йҮҚж–°жҺ’еҲ— (г„”г„Ёг„ҘЛҠ г„’г„§г„Ј г„Ҷг„һЛҠ г„Ңг„§г„қЛӢ)', mnemonic: '`re` (йҮҚж–°) + `arrange` (е®үжҺ’)гҖӮе°ҮжқұиҘҝйҮҚж–°е®үжҺ’ (`rearrange`)гҖӮ' },
            { en: 'cooperate', zh: 'еҗҲдҪң (г„Ҹг„ңЛҠ г„—г„Ёг„ӣЛӢ)', mnemonic: '`co` (е…ұеҗҢ) + `operate` (ж“ҚдҪң)гҖӮеӨ§е®¶е…ұеҗҢж“ҚдҪң (`operate`) дёҖеҸ°ж©ҹеҷЁпјҢйҖҷе°ұжҳҜеҗҲдҪң (`cooperate`)гҖӮ' },
            { en: 'stretch', zh: 'дјёеұ• (г„•г„Ј г„“г„ўЛҮ)', mnemonic: '`stretch` иҒҪиө·дҫҶеғҸ `stress` (еЈ“еҠӣ)гҖӮеЈ“еҠӣ (`stress`) еӨ§жҷӮйңҖиҰҒдјёеұ• (`stretch`) иә«й«”гҖӮ' },
            { en: 'direct', zh: 'зӣҙжҺҘзҡ„пјӣжҢҮе°Һ (г„“ЛҠ г„җг„§г„қ г„үг„ңЛҷпјӣг„“ЛҮ г„үг„ ЛҮ)', mnemonic: '`di` + `rect` (correct, жӯЈзўәзҡ„)гҖӮжҢҮе°Һ (`direct`) еҲҘдәәиө°жӯЈзўәзҡ„ (`correct`) зӣҙжҺҘи·Ҝз·ҡгҖӮ' },
            { en: 'against', zh: 'еҸҚе°ҚпјӣеҖҡйқ  (г„Ҳг„ўЛҮ г„үг„Ёг„ҹЛӢпјӣг„§ЛҮ г„Һг„ ЛӢ)', mnemonic: '`a` + `gain` (зҚІеҫ—) + `st` (strike, зҪ·е·Ҙ)гҖӮзӮәдәҶзҚІеҫ— (`gain`) ж¬ҠзӣҠиҖҢзҷјиө·зҪ·е·ҘпјҢеҸҚе°Қ (`against`) иҖҒй—ҶгҖӮ' },
            { en: 'noble', zh: 'й«ҳиІҙзҡ„ (г„Қг„  г„Қг„Ёг„ҹЛӢ г„үг„ңЛҷ)', mnemonic: '`no` (жІ’жңү) + `ble` (bull, еҗ№зүӣ)гҖӮй«ҳиІҙзҡ„ (`noble`) дәәеҫһдёҚеҗ№зүӣ (`no bull`)гҖӮ' },
            { en: 'formal', zh: 'жӯЈејҸзҡ„ (г„“г„ҘЛӢ г„•ЛӢ г„үг„ңЛҷ)', mnemonic: '`form` (еҪўејҸ) + `al`гҖӮз©ҝи‘—еҫҲжңүеҪўејҸ (`form`)пјҢд№ҹе°ұжҳҜеҫҲжӯЈејҸзҡ„ (`formal`)гҖӮ' },
            { en: 'possible', zh: 'еҸҜиғҪзҡ„ (г„Һг„ңЛҮ г„Ӣг„ҘЛҠ г„үг„ңЛҷ)', mnemonic: '`possi` иҒҪиө·дҫҶеғҸ `boss` (иҖҒй—Ҷ)гҖӮиҖҒй—Ҷ (`boss`) иӘӘйҖҷдёҖеҲҮйғҪжҳҜеҸҜиғҪзҡ„ (`possible`)гҖӮ' },
            { en: 'still', zh: 'д»Қз„¶ (г„–г„ҘЛҠ г„–г„ўЛҠ)', mnemonic: '`s` + `till` (зӣҙеҲ°)гҖӮзӣҙеҲ° (`till`) зҸҫеңЁпјҢдәӢжғ…д»Қз„¶ (`still`) жҳҜйҖҷжЁЈгҖӮ' },
            { en: 'suggestion', zh: 'е»әиӯ° (г„җг„§г„ўЛӢ г„§ЛӢ)', mnemonic: '`suggest` (е»әиӯ°) + `ion`гҖӮйҖҷжҳҜдёҖеҖӢеҫҲеҘҪзҡ„е»әиӯ° (`suggestion`)гҖӮ' },
            { en: 'sight', zh: 'иҰ–еҠӣпјӣжҷҜиұЎ (г„•ЛӢ г„Ңг„§ЛӢпјӣг„җг„§г„ҘЛҮ г„’г„§г„ӨЛӢ)', mnemonic: '`sight` иҒҪиө·дҫҶеғҸ `light` (е…ү)гҖӮжңүе…ү (`light`) жүҚиғҪжңүиҰ–еҠӣ (`sight`) зңӢеҲ°жҷҜиұЎгҖӮ' },
            { en: 'record', zh: 'зҙҖйҢ„ (г„җг„§ЛӢ г„Ңг„ЁЛӢ)', mnemonic: '`re` (дёҖеҶҚ) + `cord` (з№©еӯҗ)гҖӮеҸӨдәәз”Ёз№©еӯҗ (`cord`) жү“зөҗдҫҶдёҖеҶҚзҙҖйҢ„ (`record`) дәӢжғ…гҖӮ' },
            { en: 'central', zh: 'дёӯеӨ®зҡ„ (г„“г„Ёг„Ҙ г„§г„Ө г„үг„ңЛҷ)', mnemonic: '`center` (дёӯеҝғ) зҡ„еҪўе®№и©һгҖӮдҪҚж–јеҹҺеёӮдёӯеҝғзҡ„ (`central`)гҖӮ' },
            { en: 'heard', zh: 'иҒҪеҲ° (г„Ҡг„§г„Ҙ г„үг„ ЛӢ)', mnemonic: '`hear` (иҒҪ) зҡ„йҒҺеҺ»ејҸгҖӮз”ЁиҖіжңө (`ear`) иҒҪ (`hear`)пјҢжҲ‘е·Із¶“иҒҪеҲ°дәҶ (`heard`)гҖӮ' },
            { en: 'barely', zh: 'е№ҫд№ҺдёҚ (г„җг„§ г„Ҹг„Ё г„…г„ЁЛӢ)', mnemonic: '`bare` (иЈёйңІзҡ„) + `ly`гҖӮе№ҫд№ҺжІ’жңүз©ҝиЎЈжңҚпјҢд№ҹе°ұжҳҜе№ҫд№ҺдёҚ (`barely`)гҖӮ' },
            { en: 'complete', zh: 'е®Ңж•ҙзҡ„пјӣе®ҢжҲҗ (г„Ёг„ўЛҠ г„“г„ҘЛҮ г„үг„ңЛҷпјӣг„Ёг„ўЛҠ г„”г„ҘЛҠ)', mnemonic: '`com` (е…ұеҗҢ) + `plete` (pleat, ж‘әз—•)гҖӮжҠҠжүҖжңүж‘әз—•жӢјж№Ҡиө·дҫҶпјҢе°ұе®ҢжҲҗдәҶ (`complete`) е®Ңж•ҙзҡ„дҪңе“ҒгҖӮ' },
            { en: 'granddaughter', zh: 'еӯ«еҘі (г„ҷг„Ёг„Ј г„Ӣг„©ЛҮ)', mnemonic: '`grand` (е®ҸеҒүзҡ„) + `daughter` (еҘіе…’)гҖӮе®ҸеҒүзҡ„еҘіе…’пјҢеҚіеӯ«еҘі (`granddaughter`)гҖӮ' },
            { en: 'palm', zh: 'жүӢжҺҢпјӣжЈ•ж«ҡжЁ№ (г„•г„ЎЛҮ г„“г„ӨЛҮпјӣг„“г„Ёг„Ҙ г„Ңг„©ЛҮ г„•г„ЁЛӢ)', mnemonic: 'жҠҠжүӢжҺҢ (`palm`) ж”ҫеңЁжЈ•ж«ҡжЁ№ (`palm`) дёҠгҖӮ' },
            { en: 'control', zh: 'жҺ§еҲ¶ (г„Һг„Ёг„ҘЛӢ г„“ЛӢ)', mnemonic: '`con` (е…ұеҗҢ) + `trol` (troll, е·Ёйӯ”)гҖӮеӨ§е®¶дёҖиө·жҺ§еҲ¶ (`control`) дҪҸйӮЈйҡ»е·Ёйӯ” (`troll`)гҖӮ' },
            { en: 'minor', zh: 'ж¬ЎиҰҒзҡ„пјӣжңӘжҲҗе№ҙдәә (г„ҳЛӢ г„§г„ ЛӢ г„үг„ңЛҷпјӣг„Ёг„ҹЛӢ г„”г„ҘЛҠ г„Ӣг„§г„ўЛҠ г„–г„ЈЛҠ)', mnemonic: '`mini` (иҝ·дҪ зҡ„)гҖӮе№ҙзҙҖжҜ”ијғиҝ·дҪ зҡ„е°ұжҳҜжңӘжҲҗе№ҙдәә (`minor`)пјҢд№ҹжҳҜж¬ЎиҰҒзҡ„гҖӮ' },
            { en: 'dialogue', zh: 'е°Қи©ұ (г„үг„Ёг„ҹЛӢ г„Ҹг„Ёг„ҡЛӢ)', mnemonic: '`dia` (е…©еҖӢ) + `logue` (иӘӘи©ұ)гҖӮе…©еҖӢдәәд№Ӣй–“зҡ„и«Үи©ұе°ұжҳҜе°Қи©ұ (`dialogue`)гҖӮ' },
            { en: 'purpose', zh: 'зӣ®зҡ„ (г„Үг„ЁЛӢ г„үг„§ЛӢ)', mnemonic: '`pur` (per, жҜҸеҖӢ) + `pose` (е§ҝеӢў)гҖӮж“әжҜҸеҖӢе§ҝеӢў (`pose`) йғҪжҳҜжңүзӣ®зҡ„ (`purpose`) зҡ„гҖӮ' },
            { en: 'perfect', zh: 'е®ҢзҫҺзҡ„ (г„Ёг„ўЛҠ г„Үг„ҹЛҮ г„үг„ңЛҷ)', mnemonic: '`per` (жҜҸеҖӢ) + `fect` (fact, дәӢеҜҰ)гҖӮжҜҸеҖӢдәӢеҜҰ (`fact`) йғҪжӯЈзўәпјҢйҖҷе°ұжҳҜе®ҢзҫҺзҡ„ (`perfect`)гҖӮ' },
            { en: 'comparison', zh: 'жҜ”ијғ (г„…г„§ЛҮ г„җг„§г„ ЛӢ)', mnemonic: '`compare` (жҜ”ијғ) зҡ„еҗҚи©һгҖӮ`com` (е…ұеҗҢ) + `pair` (дёҖе°Қ)гҖӮжҠҠдёҖе°ҚжқұиҘҝж”ҫеңЁдёҖиө·еҒҡжҜ”ијғ (`comparison`)гҖӮ' },
            { en: 'course', zh: 'иӘІзЁӢ (г„Һг„ңЛӢ г„”г„ҘЛҠ)', mnemonic: 'иҒҪиө·дҫҶеғҸ `of course` (з•¶з„¶)гҖӮз•¶з„¶ (`of course`) дҪ еҝ…й ҲиҰҒдҝ®йҖҷй–ҖиӘІзЁӢ (`course`)гҖӮ' },
            { en: 'handle', zh: 'иҷ•зҗҶпјӣжҠҠжүӢ (г„”г„ЁЛҮ г„Ңг„§ЛҮпјӣг„…г„ҡЛҮ г„•г„ЎЛҮ)', mnemonic: '`hand` (жүӢ) + `le`гҖӮз”ЁжүӢ (`hand`) жҸЎдҪҸжҠҠжүӢ (`handle`) дҫҶиҷ•зҗҶ (`handle`) дәӢжғ…гҖӮ' },
            { en: 'neither', zh: 'е…©иҖ…йғҪдёҚ (г„Ңг„§г„ӨЛҮ г„“г„ңЛҮ г„үг„Ў г„…г„ЁЛӢ)', mnemonic: '`n` (not) + `either` (е…©иҖ…д№ӢдёҖ)гҖӮе…©иҖ…йғҪдёҚ (`neither`)гҖӮ' },
            { en: 'voter', zh: 'жҠ•зҘЁиҖ… (г„Ҡг„ЎЛҠ г„Ҷг„§г„ ЛӢ г„“г„ңЛҮ)', mnemonic: '`vote` (жҠ•зҘЁ) + `r` (зҡ„дәә)гҖӮжҠ•зҘЁ (`vote`) зҡ„дәәе°ұжҳҜжҠ•зҘЁиҖ… (`voter`)гҖӮ' },
            { en: 'perhaps', zh: 'д№ҹиЁұ (г„§г„қЛҮ г„’г„©ЛҮ)', mnemonic: '`per` (жҜҸеҖӢ) + `haps` (happen, зҷјз”ҹ)гҖӮжҜҸд»¶дәӢйғҪжңүеҸҜиғҪзҷјз”ҹ (`happen`)пјҢжүҖд»ҘиӘӘд№ҹиЁұ (`perhaps`)гҖӮ' }
        ];

        /* --- иӘһйҹіжң—и®Җ API --- */
        function speakWord(word) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                window.speechSynthesis.speak(utterance);
            } else {
                alert("еҫҲжҠұжӯүпјҢжӮЁзҡ„зҖҸиҰҪеҷЁзӣ®еүҚдёҚж”ҜжҸҙиӘһйҹіжң—и®ҖеҠҹиғҪе–”пјҒ");
            }
        }

        /* --- е®үе…Ёжҙ—зүҢжј”з®—жі• --- */
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const temp = array[i];
                array[i] = array[j];
                array[j] = temp;
            }
        }

        /* --- й ҒйқўеҲҮжҸӣйӮҸијҜ --- */
        function goHome() {
            document.getElementById('menu-screen').style.display = 'block';
            document.getElementById('exam-screen').style.display = 'none';
            document.getElementById('practice-screen').style.display = 'none'; 
            document.body.classList.remove('practice-mode');
        }

        function goToExam() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('exam-screen').style.display = 'block';
            document.getElementById('practice-screen').style.display = 'none';
            document.body.classList.remove('practice-mode');
            
            startGame(words);
        }

        function goToPractice() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('exam-screen').style.display = 'none';
            document.getElementById('practice-screen').style.display = 'flex'; 
            document.body.classList.add('practice-mode');
            renderPracticeList();
            resetPracticeState();
        }

        /* --- з·ҙзҝ’жЁЎејҸйӮҸијҜ --- */
        let areAnswersVisible = false;

        function resetPracticeState() {
            areAnswersVisible = false;
            const btn = document.getElementById('toggle-all-btn');
            btn.innerHTML = 'йЎҜзӨәжүҖжңүзӯ”жЎҲ / жү№ж”№<br><span style="font-size:0.8em">г„’г„§г„ўЛҮ г„•ЛӢ г„үг„ҡЛҠ г„ўЛӢ</span>';
            btn.style.backgroundColor = '#d32f2f';
        }

        function renderPracticeList() {
            const listContainer = document.getElementById('practice-list');
            listContainer.innerHTML = '';

            words.forEach((word, index) => {
                const rowContainer = document.createElement('div');
                rowContainer.className = 'practice-row-container';
                rowContainer.innerHTML = `
                    <div class="practice-row">
                        <div class="col-zh">${word.zh}</div>
                        <div class="col-input">
                            <input type="text" class="practice-input" id="p-input-${index}" placeholder="жӢјеҜ«..." autocomplete="off">
                        </div>
                        <div class="col-ans">
                            <div id="ans-${index}" class="answer-text">
                                ${word.en}
                                <button class="tts-btn" onclick="speakWord('${word.en}')" title="е”ёеҮәе–®еӯ—">рҹ”Ҡ</button>
                            </div>
                        </div>
                    </div>
                    <div id="p-mnemonic-${index}" class="practice-mnemonic">
                        рҹ’Ў <b>иЁҳжҶ¶жҸҗзӨәпјҡ</b>${word.mnemonic}
                    </div>
                `;
                listContainer.appendChild(rowContainer);
            });
        }

        // зӣЈиҒҪж•ҙеҖӢз·ҙзҝ’еҲ—иЎЁзҡ„ Enter йҚө
        document.getElementById('practice-list-container').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                toggleAllAnswers();
            }
        });

        function toggleAllAnswers() {
            const btn = document.getElementById('toggle-all-btn');
            const answers = document.querySelectorAll('.answer-text');
            const inputs = document.querySelectorAll('.practice-input');

            areAnswersVisible = !areAnswersVisible;

            if (areAnswersVisible) {
                // зӢҖж…ӢпјҡйЎҜзӨәзӯ”жЎҲ & жү№ж”№
                btn.innerHTML = 'йҡұи—ҸжүҖжңүзӯ”жЎҲ<br><span style="font-size:0.8em">г„§г„ЈЛҮ г„ҳг„ӨЛҠ г„үг„ҡЛҠ г„ўЛӢ</span>';
                btn.style.backgroundColor = '#4CAF50';
                
                answers.forEach(el => el.style.display = 'block');

                inputs.forEach((input, index) => {
                    const userWord = input.value.trim().toLowerCase();
                    const correctWord = words[index].en.toLowerCase();
                    const mnemonicDiv = document.getElementById(`p-mnemonic-${index}`);
                    
                    if (userWord === correctWord) {
                        input.classList.add('correct');
                        input.classList.remove('wrong');
                        mnemonicDiv.style.display = 'none'; // зӯ”е°ҚдёҚйЎҜзӨәжҸҗзӨә
                    } else {
                        input.classList.add('wrong');
                        input.classList.remove('correct');
                        mnemonicDiv.style.display = 'block'; // зӯ”йҢҜжҲ–з©әзҷҪйЎҜзӨәжҸҗзӨә
                    }
                });

            } else {
                // зӢҖж…Ӣпјҡйҡұи—Ҹзӯ”жЎҲ
                btn.innerHTML = 'йЎҜзӨәжүҖжңүзӯ”жЎҲ / жү№ж”№<br><span style="font-size:0.8em">г„’г„§г„ўЛҮ г„•ЛӢ г„үг„ҡЛҠ г„ўЛӢ</span>';
                btn.style.backgroundColor = '#d32f2f';
                
                answers.forEach(el => el.style.display = 'none');
                
                words.forEach((_, index) => {
                    document.getElementById(`p-mnemonic-${index}`).style.display = 'none';
                });
            }
        }


        /* --- иҖғи©ҰжЁЎејҸйӮҸијҜ --- */
        let currentQuestion = 0;
        let score = 0;
        let totalQuestions = words.length;
        let questions = [];
        let wrongWords = [];
        let isWaitingToContinue = false;

        function startGame(wordList) {
            let listToUse = words;
            if (wordList && Array.isArray(wordList) && wordList.length > 0) {
                listToUse = wordList;
            }
            
            questions = [...listToUse];
            totalQuestions = questions.length;
            shuffle(questions);
            currentQuestion = 0;
            score = 0;
            wrongWords = [];
            isWaitingToContinue = false;
            
            document.getElementById('exam-restart').style.display = 'none';
            document.getElementById('exam-retest').style.display = 'none';
            document.getElementById('wrong-words').textContent = '';
            document.getElementById('exam-answer').style.display = 'inline-block';
            document.getElementById('exam-submit').style.display = 'inline-block';
            document.getElementById('exam-submit').textContent = 'жҸҗдәӨ';
            document.getElementById('game-image').src = 'initial.png';
            document.getElementById('mnemonic').style.display = 'none';
            
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestion >= totalQuestions) {
                endGame();
                return;
            }
            
            const q = questions[currentQuestion];
            if (!q) return;

            const mnemonicEl = document.getElementById('mnemonic');
            mnemonicEl.textContent = '';
            mnemonicEl.style.display = 'none';

            isWaitingToContinue = false;
            document.getElementById('exam-submit').textContent = 'жҸҗдәӨ';
            
            document.getElementById('question').innerHTML = `ијёе…Ҙ <b>"${q.zh}"</b> зҡ„иӢұж–ҮжӢјеҜ«пјҡ`;
            document.getElementById('exam-answer').value = '';
            document.getElementById('exam-result').textContent = '';
            updateScore();
            
            setTimeout(() => {
                document.getElementById('exam-answer').focus();
            }, 50);
        }

        function checkExamAnswer() {
            if (isWaitingToContinue) {
                currentQuestion++;
                nextQuestion();
                return;
            }

            const userAnswer = document.getElementById('exam-answer').value.trim().toLowerCase();
            const q = questions[currentQuestion];
            const correctAnswer = q.en.toLowerCase();

            if (userAnswer === correctAnswer) {
                score++;
                document.getElementById('exam-result').textContent = 'жӯЈзўәпјҒ';
                document.getElementById('exam-result').style.color = 'green';
                document.getElementById('game-image').src = 'correct.png';
                setTimeout(() => {
                    currentQuestion++;
                    nextQuestion();
                }, 1500);
            } else {
                document.getElementById('exam-result').textContent = `йҢҜиӘӨгҖӮжӯЈзўәзӯ”жЎҲжҳҜпјҡ${q.en}`;
                document.getElementById('exam-result').style.color = 'red';
                document.getElementById('game-image').src = 'incorrect.png';
                
                const mnemonicEl = document.getElementById('mnemonic');
                mnemonicEl.innerHTML = `
                    рҹ’Ў <b>иЁҳжҶ¶жҸҗзӨәпјҡ</b>${q.mnemonic}
                    <br><br>
                    <button class="tts-btn" onclick="speakWord('${q.en}')">рҹ”Ҡ е”ёеҮәжӯЈзўәе–®еӯ—</button>
                `;
                mnemonicEl.style.display = 'block';
                
                document.getElementById('exam-submit').textContent = 'з№јзәҢ';
                wrongWords.push({ zh: q.zh, en: q.en, user: userAnswer, mnemonic: q.mnemonic });
                isWaitingToContinue = true;
            }
            updateScore();
        }

        function updateScore() {
            document.getElementById('score').textContent = `еҲҶж•ё: ${score} / ${totalQuestions}`;
        }

        function endGame() {
            document.getElementById('mnemonic').style.display = 'none';
            document.getElementById('question').textContent = 'жё¬й©—зөҗжқҹпјҒ';
            document.getElementById('exam-answer').style.display = 'none';
            document.getElementById('exam-submit').style.display = 'none';
            document.getElementById('exam-result').textContent = `дҪ зҡ„жңҖзөӮеҲҶж•ёпјҡ${score} / ${totalQuestions}`;
            
            if (score === totalQuestions) {
                document.getElementById('game-image').src = 'all_correct.png';
                document.getElementById('wrong-words').textContent = 'еӨӘжЈ’дәҶпјҒдҪ е…ЁйғЁзӯ”е°ҚпјҒ';
            } else {
                document.getElementById('game-image').src = 'not_all_correct.png';
                let wrongText = 'дҪ зӯ”йҢҜзҡ„е–®еӯ—пјҡ\n';
                wrongWords.forEach(w => {
                    wrongText += `- ${w.zh}: жӯЈзўәзӯ”жЎҲжҳҜ "${w.en}"пјҢдҪ ијёе…Ҙ "${w.user}"\n`;
                });
                document.getElementById('wrong-words').textContent = wrongText;
                document.getElementById('exam-retest').style.display = 'inline-block';
            }
            document.getElementById('exam-restart').style.display = 'inline-block';
        }

        document.getElementById('exam-submit').addEventListener('click', checkExamAnswer);
        document.getElementById('exam-answer').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkExamAnswer();
        });
        document.getElementById('exam-restart').addEventListener('click', () => startGame(words));
        document.getElementById('exam-retest').addEventListener('click', () => {
            if (wrongWords.length > 0) {
                const retestWords = wrongWords.map(w => ({ en: w.en, zh: w.zh, mnemonic: w.mnemonic }));
                startGame(retestWords);
            }
        });

    </script>
</body>
</html>
