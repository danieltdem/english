    <script>
        const words = [
            { en: 'except', zh: 'йҷӨдәҶ (г„”г„ЁЛҠ г„Ңг„ңЛҷ)', mnemonic: '`ex` (out, еӨ–йқў) + `cept` (take, жӢҝ)гҖӮжҠҠжҹҗеҖӢжқұиҘҝжӢҝеҺ»еӨ–йқўдёҚеҢ…еҗ«еңЁе…§пјҢе°ұжҳҜгҖҢйҷӨдәҶгҖҚгҖӮ' },
            { en: 'stretch', zh: 'дјёеұ• (г„•г„Ј г„“г„ўЛҮ)', mnemonic: '`stretch` (дјёеұ•) е’Ң `stress` (еЈ“еҠӣ) зҷјйҹізӣёдјјгҖӮиҰәеҫ—жңүеЈ“еҠӣ (`stress`) жҷӮпјҢе°ұеҒҡеҖӢдјёеұ• (`stretch`) ж”ҫй¬ҶдёҖдёӢиә«й«”еҗ§гҖӮ' },
            { en: 'german', zh: 'еҫ·еңӢзҡ„/еҫ·иӘһ (г„үг„ңЛҠ г„Қг„Ёг„ӣЛҠ г„үг„ңЛҷ)', mnemonic: '`germ` (зҙ°иҸҢ) + `man` (з”·дәә)гҖӮжғіеғҸдёҖеҖӢйқһеёёж„ӣд№ҫж·ЁгҖҒиә«дёҠжІ’жңүзҙ°иҸҢ (`germ`) зҡ„з”·дәә (`man`) дҫҶиҮӘеҫ·еңӢ (`German`)гҖӮ' },
            { en: 'contrast', zh: 'е°ҚжҜ” (г„үг„Ёг„ҹЛӢ г„…г„§ЛҮ)', mnemonic: '`contra` (зӣёеҸҚзҡ„) + `st`гҖӮжҠҠе®Ңе…ЁзӣёеҸҚ (`contra`) зҡ„жқұиҘҝж”ҫеңЁдёҖиө·жҜ”ијғпјҢе°ұжңғз”ўз”ҹеј·зғҲзҡ„е°ҚжҜ” (`contrast`)гҖӮ' },
            { en: 'indicate', zh: 'жҢҮеҮә (г„“ЛҮ г„”г„Ё)', mnemonic: '`in` (еңЁе…§) + `dictate` (еҸЈиҝ°)гҖӮеңЁеҸЈиҝ° (`dictate`) зҡ„йҒҺзЁӢдёӯпјҢзү№еҲҘеҺ»гҖҢжҢҮеҮәгҖҚ(`indicate`) йҮҚиҰҒзҡ„йғЁеҲҶгҖӮ' },
            { en: 'fetch', zh: 'жӢҝдҫҶ (г„Ӣг„ҡЛҠ г„Ңг„һЛҠ)', mnemonic: '`fetch` (жӢҝдҫҶ) иҒҪиө·дҫҶеғҸ `catch` (жҠ“дҪҸ)гҖӮзӢ—зӢ—и·‘еҺ»жҠ“дҪҸ (`catch`) йЈӣзӣӨдёҰжӢҝдҫҶ (`fetch`) зөҰдҪ гҖӮ' },
            { en: 'treat', zh: 'е°Қеҫ…/и«Ӣе®ў (г„үг„Ёг„ҹЛӢ г„үг„һЛӢ/г„‘г„§г„ҘЛҮ г„Һг„ңЛӢ)', mnemonic: '`treat` иЈЎйқўжңү `tree` (жЁ№) е’Ң `eat` (еҗғ)гҖӮеңЁжЁ№ (`tree`) дёӢдёҖиө·еҗғ (`eat`) зҫҺйЈҹпјҢжҳҜдёҖй “зҫҺеҘҪзҡ„и«Ӣе®ў (`treat`)гҖӮ' },
            { en: 'develop', zh: 'зҷјеұ• (г„Ҳг„ҡ г„“г„ўЛҮ)', mnemonic: '`de` (еҺ»йҷӨ) + `envelop` (дҝЎе°Ғ/еҢ…иЈқ)гҖӮжҠҠеҢ…иЈқжү“й–ӢпјҢи®“иЈЎйқўзҡ„дәӢзү©еҸҜд»ҘжҲҗй•·иҲҮзҷјеұ• (`develop`) еҮәдҫҶгҖӮ' },
            { en: 'harsh', zh: 'еҡҙеҺІзҡ„/еҲәиҖізҡ„ (г„§г„ўЛҠ г„Ңг„§ЛӢ г„үг„ңЛҷ)', mnemonic: '`harsh` иҒҪиө·дҫҶеғҸ `hard` (зЎ¬зҡ„/еӣ°йӣЈзҡ„) + `sh`гҖӮж…ӢеәҰйқһеёёеј·зЎ¬ (`hard`)пјҢе°ұжҳҜеҡҙеҺІзҡ„ (`harsh`)гҖӮ' },
            { en: 'supply', zh: 'дҫӣжҮү (г„Қг„Ёг„Ҙ г„§г„ҘЛӢ)', mnemonic: '`sup` (еҗ‘дёҠ/ж”ҜжҸҙ) + `ply` (еұӨ)гҖӮжҸҗдҫӣеҫҲеӨҡеұӨ (`ply`) зҡ„зү©иіҮдҫҶж”ҜжҸҙпјҢд№ҹе°ұжҳҜдҫӣжҮү (`supply`)гҖӮ' },
            { en: 'bring', zh: 'её¶дҫҶ (г„үг„һЛӢ г„Ңг„һЛҠ)', mnemonic: '`bring` иЈЎйқўи—Ҹи‘— `ring` (жҲ’жҢҮ)гҖӮд»–её¶дҫҶ (`bring`) дәҶдёҖжһҡжҲ’жҢҮ (`ring`) иҰҒзөҰеҝғж„ӣзҡ„дәәгҖӮ' },
            { en: 'growth', zh: 'жҲҗй•· (г„”г„ҘЛҠ г„“г„ӨЛҮ)', mnemonic: '`grow` (з”ҹй•·) + `th` (еҗҚи©һеӯ—е°ҫ)гҖӮжӨҚзү©жҲ–дәәдёҚж–·з”ҹй•· (`grow`) зҡ„йҒҺзЁӢпјҢе°ұеҸ«еҒҡжҲҗй•· (`growth`)гҖӮ' },
            { en: 'wreck', zh: 'з ҙеЈһ/ж®ҳйӘё (г„Ҷг„ӣЛӢ г„Ҹг„Ёг„һЛӢ/г„ҳг„ўЛҠ г„Ҹг„һЛҠ)', mnemonic: '`wreck` иҒҪиө·дҫҶеғҸ `break` (жү“з ҙ)гҖӮи»Ҡеӯҗиў«жү“з ҙ (`break`) еҫҢпјҢеү©дёӢзҡ„е°ұжҳҜж®ҳйӘё (`wreck`)гҖӮ' },
            { en: 'express', zh: 'иЎЁйҒ” (г„…г„§г„ ЛҮ г„үг„ҡЛҠ)', mnemonic: '`ex` (еҗ‘еӨ–) + `press` (ж“ еЈ“)гҖӮжҠҠе…§еҝғж·ұиҷ•зҡ„жғіжі•еҗ‘еӨ–ж“ еЈ“ (`press`) еҮәдҫҶпјҢе°ұжҳҜиЎЁйҒ” (`express`)гҖӮ' },
            { en: 'clutch', zh: 'з·ҠжҸЎ (г„җг„§г„ЈЛҮ г„Ёг„ӣЛӢ)', mnemonic: '`clutch` (з·ҠжҸЎ) иҒҪиө·дҫҶеғҸ `catch` (жҠ“дҪҸ)гҖӮз·Ҡз·ҠжҠ“дҪҸ (`catch`) дёҚж”ҫпјҢд№ҹе°ұжҳҜз·ҠжҸЎ (`clutch`)гҖӮ' },
            { en: 'visualize', zh: 'жғіеғҸ (г„’г„§г„ӨЛҮ г„’г„§г„ӨЛӢ)', mnemonic: '`visual` (иҰ–иҰәзҡ„) + `ize` (еҢ–)гҖӮи®“дәӢзү©еңЁдҪ зҡ„и…Ұжө·дёӯиҰ–иҰәеҢ– (`visual`)пјҢе°ұжҳҜеңЁжғіеғҸ (`visualize`) е®ғгҖӮ' },
            { en: 'brief', zh: 'з°Ўзҹӯзҡ„ (г„җг„§г„ўЛҮ г„үг„Ёг„ўЛҮ г„үг„ңЛҷ)', mnemonic: '`brief` иҒҪиө·дҫҶеғҸ `breath` (е‘јеҗё)гҖӮеҸӘйңҖиҰҒиҠұдёҖеҸЈе‘јеҗё (`breath`) зҡ„жҷӮй–“е°ұиғҪиӘӘе®ҢпјҢд»ЈиЎЁйқһеёёз°Ўзҹӯ (`brief`)гҖӮ' },
            { en: 'handle', zh: 'иҷ•зҗҶ/жҠҠжүӢ (г„”г„ЁЛҮ г„Ңг„§ЛҮ/г„…г„ҡЛҮ г„•г„ЎЛҮ)', mnemonic: '`hand` (жүӢ) + `le`гҖӮз”ЁдҪ зҡ„жүӢ (`hand`) еҺ»жҸЎдҪҸжҠҠжүӢпјҢжҲ–жҳҜиҰӘиҮӘеҺ»иҷ•зҗҶ (`handle`) дәӢжғ…гҖӮ' },
            { en: 'twitch', zh: 'жҠҪжҗҗ (г„”г„Ў г„”г„ЁЛӢ)', mnemonic: '`twitch` иЈЎйқўжңү `witch` (еҘіе·«)гҖӮеҘіе·« (`witch`) ж–ҪдәҶй»‘йӯ”жі•пјҢи®“йӮЈеҖӢдәәдёҚеҸ—жҺ§еҲ¶ең°жҠҪжҗҗ (`twitch`)гҖӮ' },
            { en: 'notice', zh: 'жіЁж„Ҹ (г„“г„ЁЛӢ г„§ЛӢ)', mnemonic: '`no` (жІ’жңү) + `ice` (еҶ°)гҖӮдҪ жңүжіЁж„ҸеҲ° (`notice`) еҶ°з®ұиЈЎе·Із¶“жІ’жңү (`no`) еҶ°еЎҠ (`ice`) дәҶе—Һпјҹ' },
            { en: 'sketch', zh: 'зҙ жҸҸ (г„ҷг„ЁЛӢ г„Үг„§г„ ЛҠ)', mnemonic: '`sketch` (зҙ жҸҸ) иҒҪиө·дҫҶеғҸ `catch` (жҚ•жҚү)гҖӮз”Ёз•«зӯҶеҝ«йҖҹжҚ•жҚү (`catch`) зңјеүҚзҡ„з•«йқўпјҢе°ұжҳҜз•«зҙ жҸҸ (`sketch`)гҖӮ' },
            { en: 'quite', zh: 'зӣёз•¶ (г„’г„§г„Ө г„үг„Ө)', mnemonic: '`quite` (зӣёз•¶) е’Ң `quiet` (е®үйқңзҡ„) жӢјжі•еҫҲеғҸгҖӮйҖҷеә§ең–жӣёйӨЁзӣёз•¶ (`quite`) е®үйқң (`quiet`)гҖӮ' },
            { en: 'arrest', zh: 'йҖ®жҚ• (г„үг„һЛӢ г„…г„ЁЛҮ)', mnemonic: '`a` + `rest` (дј‘жҒҜ)гҖӮиӯҰеҜҹе°ҚзҠҜдәәиӘӘпјҡдҪ иў«йҖ®жҚ• (`arrest`) дәҶпјҢеҺ»зүўиЈЎдј‘жҒҜ (`rest`) еҗ§пјҒ' }
        ];

        /* --- иӘһйҹізҷјйҹіеҠҹиғҪ (Web Speech API) --- */
        function speakWord(word) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US'; // зҫҺејҸиӢұиӘһзҷјйҹі
                window.speechSynthesis.speak(utterance);
            } else {
                alert("еҜ§еҜ§пјҢдҪ зҡ„зҖҸиҰҪеҷЁдёҚж”ҜжҸҙиӘһйҹіеҠҹиғҪе–”пјҒе»әиӯ°дҪҝз”Ё Google Chrome зҖҸиҰҪеҷЁгҖӮ");
            }
        }

        /* --- й ҒйқўеҲҮжҸӣйӮҸијҜ --- */
        function goHome() {
            document.getElementById('menu-screen').style.display = 'block';
            document.getElementById('exam-screen').style.display = 'none';
            document.getElementById('practice-screen').style.display = 'none'; 
            document.body.classList.remove('practice-mode');
        }

        function goToExam() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('exam-screen').style.display = 'block';
            document.getElementById('practice-screen').style.display = 'none';
            document.body.classList.remove('practice-mode');
            startGame(); // еҲқе§ӢеҢ–иҖғи©Ұ
        }

        function goToPractice() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('exam-screen').style.display = 'none';
            document.getElementById('practice-screen').style.display = 'flex'; 
            document.body.classList.add('practice-mode');
            renderPracticeList(); // з”ўз”ҹз·ҙзҝ’еҲ—иЎЁ
            resetPracticeState(); // йҮҚзҪ®жҢүйҲ•зӢҖж…Ӣ
        }

        /* --- з·ҙзҝ’жЁЎејҸйӮҸијҜ --- */
        let areAnswersVisible = false;

        function resetPracticeState() {
            areAnswersVisible = false;
            const btn = document.getElementById('toggle-all-btn');
            btn.innerHTML = 'йЎҜзӨәжүҖжңүзӯ”жЎҲ / жү№ж”№<br><span style="font-size:0.8em">г„’г„§г„ўЛҮ г„•ЛӢ г„үг„ҡЛҠ г„ўЛӢ</span>';
            btn.style.backgroundColor = '#d32f2f';
        }

        function renderPracticeList() {
            const listContainer = document.getElementById('practice-list');
            listContainer.innerHTML = '';

            words.forEach((word, index) => {
                const row = document.createElement('div');
                row.className = 'practice-row';
                row.innerHTML = `
                    <div class="col-zh">
                        ${word.zh}
                    </div>
                    <div class="col-input">
                        <input type="text" class="practice-input" id="p-input-${index}" placeholder="жӢјеҜ«..." autocomplete="off">
                        <div id="p-feedback-${index}" class="practice-feedback" style="display:none; text-align:left; font-size:14px; color:#ffcc00; margin-top:8px; line-height:1.4;">
                            рҹ’Ў <b>иЁҳжҶ¶жҸҗзӨәпјҡ</b><br>${word.mnemonic}
                        </div>
                    </div>
                    <div class="col-ans">
                        <div id="ans-${index}" class="answer-text">
                            ${word.en}
                            <button onclick="speakWord('${word.en}')" class="tts-btn" title="е”ёеҮәйҖҷеҖӢеӯ—">рҹ”Ҡ</button>
                        </div>
                    </div>
                `;
                listContainer.appendChild(row);
            });
        }

        // дәӢд»¶е§”жҙҫпјҡзӣЈиҒҪж•ҙеҖӢз·ҙзҝ’еҚҖеЎҠпјҢжҢүдёӢ Enter и§ёзҷјжү№ж”№
        document.getElementById('practice-list-container').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                toggleAllAnswers();
            }
        });

        function toggleAllAnswers() {
            const btn = document.getElementById('toggle-all-btn');
            const answers = document.querySelectorAll('.answer-text');
            const inputs = document.querySelectorAll('.practice-input');

            areAnswersVisible = !areAnswersVisible;

            if (areAnswersVisible) {
                // зӢҖж…ӢпјҡйЎҜзӨәзӯ”жЎҲ & жү№ж”№
                btn.innerHTML = 'йҡұи—ҸжүҖжңүзӯ”жЎҲ<br><span style="font-size:0.8em">г„§г„ЈЛҮ г„ҳг„ӨЛҠ г„үг„ҡЛҠ г„ўЛӢ</span>';
                btn.style.backgroundColor = '#4CAF50';
                
                answers.forEach(el => el.style.display = 'block'); // йЎҜзӨәзӯ”жЎҲ

                // жү№ж”№жҜҸдёҖеҖӢијёе…ҘжЎҶпјҲе…ЁиҪүе°ҸеҜ«еҲӨж–·пјү
                inputs.forEach((input, index) => {
                    const userWord = input.value.trim().toLowerCase();
                    const correctWord = words[index].en.toLowerCase();
                    const feedbackEl = document.getElementById(`p-feedback-${index}`);
                    
                    if (userWord === correctWord) {
                        input.classList.add('correct');
                        input.classList.remove('wrong');
                        feedbackEl.style.display = 'none'; // зӯ”е°ҚдёҚйЎҜзӨәиЁҳжҶ¶жі•
                    } else {
                        input.classList.add('wrong');
                        input.classList.remove('correct');
                        feedbackEl.style.display = 'block'; // зӯ”йҢҜйЎҜзӨәиЁҳжҶ¶жі•
                    }
                });

            } else {
                // зӢҖж…Ӣпјҡйҡұи—Ҹзӯ”жЎҲ
                btn.innerHTML = 'йЎҜзӨәжүҖжңүзӯ”жЎҲ / жү№ж”№<br><span style="font-size:0.8em">г„’г„§г„ўЛҮ г„•ЛӢ г„үг„ҡЛҠ г„ўЛӢ</span>';
                btn.style.backgroundColor = '#d32f2f';
                
                answers.forEach(el => el.style.display = 'none'); 
                // йҡұи—ҸжүҖжңүзҡ„иЁҳжҶ¶жі•жҸҗзӨә
                document.querySelectorAll('.practice-feedback').forEach(el => el.style.display = 'none');
            }
        }


        /* --- иҖғи©ҰжЁЎејҸйӮҸијҜ --- */
        let currentQuestion = 0;
        let score = 0;
        let totalQuestions = words.length;
        let examQuestions = [];
        let wrongWords = [];
        let isWaitingToContinue = false;

        function startGame(wordList = words) {
            examQuestions = [...wordList];
            totalQuestions = examQuestions.length;
            shuffle(examQuestions);
            currentQuestion = 0;
            score = 0;
            wrongWords = [];
            isWaitingToContinue = false;
            
            // йҮҚзҪ®UI
            document.getElementById('exam-restart').style.display = 'none';
            document.getElementById('exam-retest').style.display = 'none';
            document.getElementById('wrong-words').textContent = '';
            document.getElementById('exam-answer').style.display = 'inline-block';
            document.getElementById('exam-submit').style.display = 'inline-block';
            document.getElementById('exam-submit').textContent = 'жҸҗдәӨ';
            document.getElementById('game-image').src = 'initial.png';
            document.getElementById('mnemonic').style.display = 'none';
            
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestion >= totalQuestions) {
                endGame();
                return;
            }
            const mnemonicEl = document.getElementById('mnemonic');
            mnemonicEl.textContent = '';
            mnemonicEl.style.display = 'none';

            isWaitingToContinue = false;
            document.getElementById('exam-submit').textContent = 'жҸҗдәӨ';
            const q = examQuestions[currentQuestion];
            document.getElementById('question').textContent = `ијёе…Ҙ "${q.zh}" зҡ„иӢұж–ҮжӢјеҜ«пјҡ`;
            document.getElementById('exam-answer').value = '';
            document.getElementById('exam-result').textContent = '';
            updateScore();
        }

        function checkExamAnswer() {
            if (isWaitingToContinue) {
                currentQuestion++;
                nextQuestion();
                return;
            }

            const userAnswer = document.getElementById('exam-answer').value.trim().toLowerCase();
            const q = examQuestions[currentQuestion];
            const correctAnswer = q.en.toLowerCase(); // дёҚеҲҶеӨ§е°ҸеҜ«еҲӨж–·

            if (userAnswer === correctAnswer) {
                score++;
                document.getElementById('exam-result').textContent = 'жӯЈзўәпјҒ';
                document.getElementById('exam-result').style.color = 'green';
                document.getElementById('game-image').src = 'correct.png';
                setTimeout(() => {
                    currentQuestion++;
                    nextQuestion();
                }, 1500);
            } else {
                // зӯ”йҢҜпјҢе…¬дҪҲзӯ”жЎҲдёҰжҸҗдҫӣзҷјйҹіжҢүйҲ•
                document.getElementById('exam-result').innerHTML = `йҢҜиӘӨгҖӮжӯЈзўәзӯ”жЎҲжҳҜпјҡ${q.en} <button onclick="speakWord('${q.en}')" class="tts-btn" title="е”ёеҮәйҖҷеҖӢеӯ—">рҹ”Ҡ е”ёеҮәзҷјйҹі</button>`;
                document.getElementById('exam-result').style.color = 'red';
                document.getElementById('game-image').src = 'incorrect.png';
                
                // йЎҜзӨәиЁҳжҶ¶жі•
                const mnemonicEl = document.getElementById('mnemonic');
                mnemonicEl.innerHTML = `рҹ’Ў <b>иЁҳжҶ¶жҸҗзӨәпјҡ</b><br>${q.mnemonic}`;
                mnemonicEl.style.display = 'block';
                
                document.getElementById('exam-submit').textContent = 'з№јзәҢ';
                wrongWords.push({ zh: q.zh, en: q.en, user: userAnswer, mnemonic: q.mnemonic });
                isWaitingToContinue = true;
            }
            updateScore();
        }

        function updateScore() {
            document.getElementById('score').textContent = `еҲҶж•ё: ${score} / ${totalQuestions}`;
        }

        function endGame() {
            document.getElementById('mnemonic').style.display = 'none';
            document.getElementById('question').textContent = 'жё¬й©—зөҗжқҹпјҒ';
            document.getElementById('exam-answer').style.display = 'none';
            document.getElementById('exam-submit').style.display = 'none';
            document.getElementById('exam-result').textContent = `дҪ зҡ„жңҖзөӮеҲҶж•ёпјҡ${score} / ${totalQuestions}`;
            
            if (score === totalQuestions) {
                document.getElementById('game-image').src = 'all_correct.png';
                document.getElementById('wrong-words').textContent = 'еӨӘжЈ’дәҶпјҒдҪ е…ЁйғЁзӯ”е°ҚпјҒ';
            } else {
                document.getElementById('game-image').src = 'not_all_correct.png';
                let wrongText = 'дҪ зӯ”йҢҜзҡ„е–®еӯ—пјҡ\n';
                wrongWords.forEach(w => {
                    wrongText += `- ${w.zh}: жӯЈзўәзӯ”жЎҲжҳҜ "${w.en}"пјҢдҪ ијёе…Ҙ "${w.user}"\n`;
                });
                document.getElementById('wrong-words').textContent = wrongText;
                document.getElementById('exam-retest').style.display = 'inline-block';
            }
            document.getElementById('exam-restart').style.display = 'inline-block';
        }

        // з¶Ғе®ҡиҖғи©ҰжЁЎејҸдәӢд»¶
        document.getElementById('exam-submit').addEventListener('click', checkExamAnswer);
        document.getElementById('exam-answer').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkExamAnswer();
        });
        document.getElementById('exam-restart').addEventListener('click', () => startGame(words));
        document.getElementById('exam-retest').addEventListener('click', () => {
            if (wrongWords.length > 0) {
                const retestWords = wrongWords.map(w => ({ en: w.en, zh: w.zh, mnemonic: w.mnemonic }));
                startGame(retestWords);
            }
        });

    </script>
</body>
</html>
