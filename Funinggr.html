<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit 9: Where...? & Proper Nouns</title>
<style>
  body { 
    font-family: "Microsoft JhengHei", Arial, sans-serif; 
    background-color: #f0f8ff; 
    text-align: center; 
    padding: 20px; 
  }
  #quiz-container { 
    background: white; 
    border-radius: 15px; 
    padding: 30px; 
    box-shadow: 0 4px 8px rgba(0,0,0,0.2); 
    max-width: 600px; 
    margin: auto; 
  }
  h1 { color: #ff6347; }
  .question { 
    font-size: 24px; 
    margin-bottom: 20px; 
    color: #333; 
    line-height: 2;
  }
  .options { 
    display: flex; 
    flex-direction: column; 
    gap: 15px; 
  }
  button { 
    padding: 15px; 
    font-size: 20px; 
    border: none; 
    border-radius: 10px; 
    cursor: pointer; 
    background-color: #87cefa; 
    transition: 0.3s; 
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  button:hover { 
    background-color: #4682b4; 
    color: white; 
  }
  #feedback { 
    font-size: 24px; 
    font-weight: bold; 
    margin-top: 20px; 
    height: 30px; 
  }
  .correct { color: #32cd32; }
  .incorrect { color: #dc143c; }
  #next-btn { 
    margin-top: 20px; 
    background-color: #ffb6c1; 
    display: none; 
  }
  #next-btn:hover { background-color: #ff69b4; }
  ruby { font-size: 1.2em; }
  rt { font-size: 0.5em; color: #555; }
  .eng-text { font-family: "Comic Sans MS", cursive, sans-serif; color: #000080; }
  .progress { font-size: 18px; color: #666; margin-bottom: 15px; font-weight: bold; }
</style>
</head>
<body>

<div id="quiz-container">
  <h1><ruby>英<rt>ㄧㄥ</rt></ruby><ruby>文<rt>ㄨㄣˊ</rt></ruby><ruby>測<rt>ㄘㄜˋ</rt></ruby><ruby>驗<rt>ㄧㄢˋ</rt></ruby> - Unit 9 <ruby>進<rt>ㄐㄧㄣˋ</rt></ruby><ruby>階<rt>ㄐㄧㄝ</rt></ruby><ruby>版<rt>ㄅㄢˇ</rt></ruby></h1>
  <div id="quiz-content">
    <div id="progress" class="progress"></div>
    <div id="question-text" class="question"></div>
    <div id="options-container" class="options"></div>
    <div id="feedback"></div>
    <button id="next-btn" onclick="nextQuestion()"><ruby>下<rt>ㄒㄧㄚˋ</rt></ruby><ruby>一<rt>ㄧ</rt></ruby><ruby>題<rt>ㄊㄧˊ</rt></ruby></button>
  </div>
  <div id="result-screen" style="display: none;">
    <h2><ruby>測<rt>ㄘㄜˋ</rt></ruby><ruby>驗<rt>ㄧㄢˋ</rt></ruby><ruby>結<rt>ㄐㄧㄝˊ</rt></ruby><ruby>束<rt>ㄕㄨˋ</rt></ruby>！</h2>
    <p class="question"><ruby>你<rt>ㄋㄧˇ</rt></ruby><ruby>得<rt>ㄉㄜˊ</rt></ruby><ruby>了<rt>ㄌㄜ˙</rt></ruby> <span id="score" style="color: #ff6347; font-size: 30px; font-weight: bold;"></span> <ruby>分<rt>ㄈㄣ</rt></ruby></p>
    <button onclick="restartQuiz()"><ruby>重<rt>ㄔㄨㄥˊ</rt></ruby><ruby>新<rt>ㄒㄧㄣ</rt></ruby><ruby>開<rt>ㄎㄞ</rt></ruby><ruby>始<rt>ㄕˇ</rt></ruby></button>
  </div>
</div>

<script>
const questions = [
  {
    q: "<ruby>友<rt>ㄧㄡˇ</rt></ruby><ruby>寧<rt>ㄋㄧㄥˊ</rt></ruby><ruby>在<rt>ㄗㄞˋ</rt></ruby><ruby>樹<rt>ㄕㄨˋ</rt></ruby><ruby>下<rt>ㄒㄧㄚˋ</rt></ruby>。<br><span class='eng-text'>Where is Youning? He is ____ the tree.</span>",
    options: ["in", "on", "under"],
    answer: 2
  },
  {
    q: "<ruby>馥<rt>ㄈㄨˋ</rt></ruby><ruby>寧<rt>ㄋㄧㄥˊ</rt></ruby><ruby>在<rt>ㄗㄞˋ</rt></ruby><ruby>房<rt>ㄈㄤˊ</rt></ruby><ruby>子<rt>ㄗ˙</rt></ruby><ruby>裡<rt>ㄌㄧˇ</rt></ruby>。<br><span class='eng-text'>Where is Funing? She is ____ the house.</span>",
    options: ["in", "on", "under"],
    answer: 0
  },
  {
    q: "<ruby>蘋<rt>ㄆㄧㄥˊ</rt></ruby><ruby>果<rt>ㄍㄨㄛˇ</rt></ruby><ruby>在<rt>ㄗㄞˋ</rt></ruby><ruby>桌<rt>ㄓㄨㄛ</rt></ruby><ruby>子<rt>ㄗ˙</rt></ruby><ruby>上<rt>ㄕㄤˋ</rt></ruby>。<br><span class='eng-text'>Where is the apple? It is ____ the table.</span>",
    options: ["in", "on", "under"],
    answer: 1
  },
  {
    q: "<ruby>靴<rt>ㄒㄩㄝ</rt></ruby><ruby>子<rt>ㄗ˙</rt></ruby><ruby>在<rt>ㄗㄞˋ</rt></ruby><ruby>哪<rt>ㄋㄚˇ</rt></ruby><ruby>裡<rt>ㄌㄧˇ</rt></ruby>？<br><span class='eng-text'>____ are the boots?</span>",
    options: ["Where's", "Where are", "What are"],
    answer: 1
  },
  {
    q: "<ruby>帽<rt>ㄇㄠˋ</rt></ruby><ruby>子<rt>ㄗ˙</rt></ruby><ruby>在<rt>ㄗㄞˋ</rt></ruby><ruby>哪<rt>ㄋㄚˇ</rt></ruby><ruby>裡<rt>ㄌㄧˇ</rt></ruby>？<br><span class='eng-text'>____ the hat?</span>",
    options: ["Where's", "Where are", "Who's"],
    answer: 0
  },
  {
    q: "<ruby>友<rt>ㄧㄡˇ</rt></ruby><ruby>寧<rt>ㄋㄧㄥˊ</rt></ruby><ruby>在<rt>ㄗㄞˋ</rt></ruby><ruby>客<rt>ㄎㄜˋ</rt></ruby><ruby>廳<rt>ㄊㄧㄥ</rt></ruby><ruby>裡<rt>ㄌㄧˇ</rt></ruby>。<br><span class='eng-text'>____ Youning is in the living room.</span>",
    options: ["The", "A", "X (<ruby>不<rt>ㄅㄨˋ</rt></ruby><ruby>填<rt>ㄊㄧㄢˊ</rt></ruby><ruby>寫<rt>ㄒㄧㄝˇ</rt></ruby>)"],
    answer: 2
  },
  {
    q: "<ruby>馥<rt>ㄈㄨˋ</rt></ruby><ruby>寧<rt>ㄋㄧㄥˊ</rt></ruby><ruby>在<rt>ㄗㄞˋ</rt></ruby><ruby>台<rt>ㄊㄞˊ</rt></ruby><ruby>北<rt>ㄅㄟˇ</rt></ruby>。<br><span class='eng-text'>Funing is in ____ Taipei.</span>",
    options: ["the", "a", "X (<ruby>不<rt>ㄅㄨˋ</rt></ruby><ruby>填<rt>ㄊㄧㄢˊ</rt></ruby><ruby>寫<rt>ㄒㄧㄝˇ</rt></ruby>)"],
    answer: 2
  },
  {
    q: "<ruby>這<rt>ㄓㄜˋ</rt></ruby><ruby>本<rt>ㄅㄣˇ</rt></ruby><ruby>書<rt>ㄕㄨ</rt></ruby><ruby>在<rt>ㄗㄞˋ</rt></ruby><ruby>哪<rt>ㄋㄚˇ</rt></ruby><ruby>裡<rt>ㄌㄧˇ</rt></ruby>？<br><span class='eng-text'>Where is ____ book?</span>",
    options: ["the", "X (<ruby>不<rt>ㄅㄨˋ</rt></ruby><ruby>填<rt>ㄊㄧㄢˊ</rt></ruby><ruby>寫<rt>ㄒㄧㄝˇ</rt></ruby>)", "are"],
    answer: 0
  },
  {
    q: "<ruby>史<rt>ㄕˇ</rt></ruby><ruby>密<rt>ㄇㄧˋ</rt></ruby><ruby>斯<rt>ㄙ</rt></ruby><ruby>先<rt>ㄒㄧㄢ</rt></ruby><ruby>生<rt>ㄕㄥ</rt></ruby><ruby>在<rt>ㄗㄞˋ</rt></ruby><ruby>花<rt>ㄏㄨㄚ</rt></ruby><ruby>園<rt>ㄩㄢˊ</rt></ruby><ruby>裡<rt>ㄌㄧˇ</rt></ruby><ruby>嗎<rt>ㄇㄚ˙</rt></ruby>？<br><span class='eng-text'>Is ____ Mr. Smith in the garden?</span>",
    options: ["the", "a", "X (<ruby>不<rt>ㄅㄨˋ</rt></ruby><ruby>填<rt>ㄊㄧㄢˊ</rt></ruby><ruby>寫<rt>ㄒㄧㄝˇ</rt></ruby>)"],
    answer: 2
  },
  {
    q: "<ruby>台<rt>ㄊㄞˊ</rt></ruby><ruby>灣<rt>ㄨㄢ</rt></ruby><ruby>很<rt>ㄏㄣˇ</rt></ruby><ruby>美<rt>ㄇㄟˇ</rt></ruby><ruby>麗<rt>ㄌㄧˋ</rt></ruby>。<br><span class='eng-text'>____ Taiwan is beautiful.</span>",
    options: ["The", "A", "X (<ruby>不<rt>ㄅㄨˋ</rt></ruby><ruby>填<rt>ㄊㄧㄢˊ</rt></ruby><ruby>寫<rt>ㄒㄧㄝˇ</rt></ruby>)"],
    answer: 2
  }
];

let currentQuestionIndex = 0;
let score = 0;

function loadQuestion() {
  const q = questions[currentQuestionIndex];
  
  // 更新進度條文字
  document.getElementById("progress").innerHTML = `<ruby>第<rt>ㄉㄧˋ</rt></ruby> ${currentQuestionIndex + 1} <ruby>題<rt>ㄊㄧˊ</rt></ruby> / <ruby>共<rt>ㄍㄨㄥˋ</rt></ruby> ${questions.length} <ruby>題<rt>ㄊㄧˊ</rt></ruby>`;
  
  document.getElementById("question-text").innerHTML = q.q;
  const optionsContainer = document.getElementById("options-container");
  optionsContainer.innerHTML = "";
  
  q.options.forEach((opt, index) => {
    const btn = document.createElement("button");
    btn.innerHTML = opt; // 讓選項裡面的注音也能正常顯示
    btn.className = "eng-text";
    btn.onclick = () => checkAnswer(index, btn);
    optionsContainer.appendChild(btn);
  });
  
  document.getElementById("feedback").textContent = "";
  document.getElementById("next-btn").style.display = "none";
}

function checkAnswer(selectedIndex, btn) {
  const q = questions[currentQuestionIndex];
  const feedback = document.getElementById("feedback");
  const buttons = document.querySelectorAll("#options-container button");
  
  buttons.forEach(b => b.disabled = true);
  
  if (selectedIndex === q.answer) {
    btn.style.backgroundColor = "#32cd32";
    feedback.innerHTML = "<span class='correct'><ruby>答<rt>ㄉㄚˊ</rt></ruby><ruby>對<rt>ㄉㄨㄟˋ</rt></ruby><ruby>了<rt>ㄌㄜ˙</rt></ruby>！ Excellent!</span>";
    score += 10;
  } else {
    btn.style.backgroundColor = "#dc143c";
    btn.style.color = "white";
    buttons[q.answer].style.backgroundColor = "#32cd32";
    feedback.innerHTML = "<span class='incorrect'><ruby>答<rt>ㄉㄚˊ</rt></ruby><ruby>錯<rt>ㄘㄨㄛˋ</rt></ruby><ruby>了<rt>ㄌㄜ˙</rt></ruby>！ Keep trying!</span>";
  }
  
  document.getElementById("next-btn").style.display = "inline-block";
}

function nextQuestion() {
  currentQuestionIndex++;
  if (currentQuestionIndex < questions.length) {
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("quiz-content").style.display = "none";
  document.getElementById("result-screen").style.display = "block";
  document.getElementById("score").textContent = score;
}

function restartQuiz() {
  currentQuestionIndex = 0;
  score = 0;
  document.getElementById("quiz-content").style.display = "block";
  document.getElementById("result-screen").style.display = "none";
  loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
