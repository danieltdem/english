<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家鄉的山與海：深度挑戰測驗</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #e3f2fd 100%);
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2e7d32;
            border-bottom: 2px solid #81c784;
            padding-bottom: 10px;
        }
        .intro {
            text-align: center;
            color: #555;
            font-style: italic;
            margin-bottom: 30px;
        }
        .question-block {
            background-color: #f9fbf9;
            border-left: 5px solid #1976d2;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 4px;
        }
        .question-title {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 15px;
            color: #1565c0;
        }
        .option {
            display: block;
            margin-bottom: 10px;
            padding: 8px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .option:hover {
            background-color: #e3f2fd;
        }
        input[type="checkbox"] {
            margin-right: 10px;
            transform: scale(1.2);
        }
        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #0277bd;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .submit-btn:hover {
            background-color: #01579b;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏔️ 家鄉的山與海：資源轉型與永續發展測驗 🌊</h1>
    <p class="intro">這是一份高難度的複選測驗。請仔細閱讀選項，每題皆有兩個或以上的正確答案。</p>

    <form id="quizForm">
        
        <div class="question-block">
            <div class="question-title">1. 關於臺灣山林資源的開發歷史與影響，下列敘述哪些是正確的？</div>
            <label class="option">
                <input type="checkbox" name="q1" value="A"> A. 早期原住民對山林的利用奠基於「不過度捕殺」與「分享」的共生智慧，並以採集野菜及種植小米為食。
            </label>
            <label class="option">
                <input type="checkbox" name="q1" value="B"> B. 漢人提煉樟腦的技術是將樟樹幹削成木片進行水蒸餾，且樹齡越年輕的樟樹，其樟腦萃取比例越高。
            </label>
            <label class="option">
                <input type="checkbox" name="q1" value="C"> C. 阿里山森林鐵路最初的興建目的是為了帶動高山觀光產業，並連帶使嘉義市發展成「木材都市」。
            </label>
            <label class="option">
                <input type="checkbox" name="q1" value="D"> D. 花蓮林田山過去曾是生活機能完善的伐木社區（設有醫務室、學校等），現今已成功轉型為林業文化園區。
            </label>
            <label class="option">
                <input type="checkbox" name="q1" value="E"> E. 近代因經濟利益驅動的大面積山林開發，直接導致了野生動物棲息地遭破壞，且壓縮了原住民的生活空間。
            </label>
        </div>

        <div class="question-block">
            <div class="question-title">2. 面對當前山林環境的挑戰，現代山林政策與守護行動包含了下列哪些正確觀念與具體作為？</div>
            <label class="option">
                <input type="checkbox" name="q2" value="A"> A. 為了落實「環境保育」，政府目前的政策是全面禁止任何木材的砍伐與買賣，僅推廣造林。
            </label>
            <label class="option">
                <input type="checkbox" name="q2" value="B"> B. 綠色消費的具體行動之一，是提倡選購經「政府認證」的本土木材，或具備「國際認證」永續經營的進口木材。
            </label>
            <label class="option">
                <input type="checkbox" name="q2" value="C"> C. 「無痕山林（LNT）」原則鼓勵登山者除了帶走自身垃圾外，也可適度採集山中的野生植物回家進行人工復育。
            </label>
            <label class="option">
                <input type="checkbox" name="q2" value="D"> D. 確保親近山林時的安全，除了準備適當的裝備外，更強調事前的行程規劃與詳細的天氣觀測。
            </label>
            <label class="option">
                <input type="checkbox" name="q2" value="E"> E. 政府與民間積極推動重新造林，並將以往的林場規劃為國家森林遊樂區或林業文化園區以推動環境教育。
            </label>
        </div>

        <div class="question-block">
            <div class="question-title">3. 關於臺灣漁業技術的演進、面臨的困境以及轉型方向，下列敘述哪些正確？</div>
            <label class="option">
                <input type="checkbox" name="q3" value="A"> A. 早期近海漁業常使用石滬與牽罟等較簡單的工具與人力捕撈，這使得漁獲種類與產量受到較大限制。
            </label>
            <label class="option">
                <input type="checkbox" name="q3" value="B"> B. 現代化漁業透過導入衛星電話、魚探機與冷藏設備，有效讓漁船能航行得更遠並大幅增加漁獲量。
            </label>
            <label class="option">
                <input type="checkbox" name="q3" value="C"> C. 為了徹底解決過度捕撈的問題，臺灣目前已將所有的漁業捕捉活動，全數轉型為「固定箱網」養殖技術。
            </label>
            <label class="option">
                <input type="checkbox" name="q3" value="D"> D. 臺灣漁業目前面臨勞動力斷層的危機，因傳統捕魚工作辛苦且危險，目前大量仰賴引進外籍移工補足人力。
            </label>
            <label class="option">
                <input type="checkbox" name="q3" value="E"> E. 統計顯示，自民國70年至110年間，臺灣近海漁業產量因為現代化技術的普及而呈現大幅且持續的上升趨勢。
            </label>
            <label class="option">
                <input type="checkbox" name="q3" value="F"> F. 發展「觀光漁市」、推廣傳統捕魚體驗與海洋生態之旅，是目前鼓勵青年返鄉並推動漁村產業轉型的重要契機。
            </label>
        </div>

        <div class="question-block">
            <div class="question-title">4. 為了達成「海洋國家」的永續發展，公民行動與綜合保育措施至關重要。下列哪些屬於正確的海洋永續行動與觀念？</div>
            <label class="option">
                <input type="checkbox" name="q4" value="A"> A. 消費者在日常選購海鮮時，為了減輕海洋生態負擔，應優先購買「野生捕撈」的水產品，減少對「養殖水產」的依賴。
            </label>
            <label class="option">
                <input type="checkbox" name="q4" value="B"> B. 友善環境的食魚習慣包含：挑選「當季盛產」的海鮮，並且絕對不選購未長大的小魚或逐年稀少的物種。
            </label>
            <label class="option">
                <input type="checkbox" name="q4" value="C"> C. 積極的保育行動包含了針對數量快速減少的物種或惡化的棲地進行「復育」，以尋求增加其數量或恢復生存環境。
            </label>
            <label class="option">
                <input type="checkbox" name="q4" value="D"> D. 海洋環境的退化主要只會影響漁民的生計與漁產價格，對一般民眾食用海鮮的食品安全與健康並不會有直接影響。
            </label>
            <label class="option">
                <input type="checkbox" name="q4" value="E"> E. 未來的保育承諾要求我們在日常生活中減少使用塑膠製品、參與淨灘，並拒絕購買任何使用瀕危海洋生物製成的物品。
            </label>
        </div>

        <button type="button" class="submit-btn" onclick="alert('測驗完成！這是一份自我挑戰測驗，你可以對照你在 HTML 檔案裡的隱藏註解來核對正確答案喔！')">提交測驗</button>
    </form>
</div>

</body>
</html>
