<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小飛魚文化測驗 - 挑戰你的文化洞察力！</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0f7fa 0%, #80deea 100%);
            color: #004d40;
            padding: 20px;
            line-height: 1.6;
        }
        .quiz-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            max-width: 850px;
            margin: auto;
        }
        h1 {
            text-align: center;
            color: #00796b;
            border-bottom: 3px dashed #00acc1;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .intro {
            text-align: center;
            font-size: 1.1em;
            color: #00695c;
            margin-bottom: 30px;
        }
        .question-block {
            margin-bottom: 35px;
            padding: 20px;
            background: #ffffff;
            border-left: 6px solid #26a69a;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .question-text {
            font-weight: bold;
            font-size: 1.15em;
            margin-bottom: 15px;
            color: #004d40;
        }
        .option-label {
            display: block;
            margin: 10px 0;
            padding: 12px 15px;
            background: #e0f2f1;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }
        .option-label:hover {
            background: #b2dfdb;
            transform: translateX(5px);
        }
        input[type="checkbox"] {
            margin-right: 10px;
            transform: scale(1.2);
            accent-color: #00796b;
        }
        button.submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            font-size: 1.3em;
            font-weight: bold;
            background-color: #00897b;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s, box-shadow 0.3s;
            margin-top: 30px;
        }
        button.submit-btn:hover {
            background-color: #00695c;
            box-shadow: 0 5px 15px rgba(0,137,123,0.4);
        }
        .feedback {
            display: none;
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.95em;
        }
        .feedback.correct {
            background: #e8f5e9;
            border-left: 5px solid #4caf50;
            color: #2e7d32;
        }
        .feedback.wrong {
            background: #fff3e0;
            border-left: 5px solid #ff9800;
            color: #e65100;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>🌊 舞吧！小飛魚 深度文化測驗 🐟</h1>
    <p class="intro">歡迎來到測驗挑戰！本測驗為**複選題**，每題皆有**兩個或以上**的正確選項。<br>請仔細閱讀，選出所有符合文本概念的敘述。</p>

    <form id="quizForm">
        
        <div class="question-block" id="q1-block">
            <div class="question-text">1. 關於〈舞吧！小飛魚〉的文本性質、背景設定與敘事結構，下列敘述哪些是正確的？</div>
            <label class="option-label"><input type="checkbox" name="q1" value="A"> A) 本文體裁為記敘文，主要記錄了小飛魚文化展演隊從排斥傳統到建立民族自豪感的蛻變歷程。</label>
            <label class="option-label"><input type="checkbox" name="q1" value="B"> B) 顏老師作為達悟族部落的在地長老，以九牛二虎之力推動傳統文化的復育與傳承。</label>
            <label class="option-label"><input type="checkbox" name="q1" value="C"> C) 故事的發展經歷了「起因、經過、結果、結語」四個階段，其中登上波蘭國際舞台為展現文化自信的關鍵結果。</label>
            <label class="option-label"><input type="checkbox" name="q1" value="D"> D) 男童初期對傳統服飾的抗拒，反映出年輕世代與傳統文化間存在著嚴重的認知斷層。</label>
            <label class="option-label"><input type="checkbox" name="q1" value="E"> E) 文本的核心主旨僅限於客觀記錄椰油國小學童出國比賽奪冠的歷程，並未涉及深層的心理轉變。</label>
            <div class="feedback" id="feedback-q1"></div>
        </div>

        <div class="question-block" id="q2-block">
            <div class="question-text">2. 關於核心衝突的化解與文化復育運動的要素，下列分析哪些符合文本意旨？</div>
            <label class="option-label"><input type="checkbox" name="q2" value="A"> A) 顏老師的教學策略並非採用權威式的強迫，而是透過長期的陪伴與引導，讓孩子逐漸接納傳統。</label>
            <label class="option-label"><input type="checkbox" name="q2" value="B"> B) 國際觀眾的喝采扮演了「大眾的肯定與尊重」之角色，促使孩子們將傳統服飾視為引以為傲的民族標記。</label>
            <label class="option-label"><input type="checkbox" name="q2" value="C"> C) 孩子們起初認為丁字褲是「族裡老人穿的」，這顯示他們完全不了解丁字褲的穿著技術，因而產生排斥。</label>
            <label class="option-label"><input type="checkbox" name="q2" value="D"> D) 文本中提到的文化復育三大要素，顏老師的角色完美體現了其中的「內在的覺醒與勇氣」。</label>
            <label class="option-label"><input type="checkbox" name="q2" value="E"> E) 學生克服原本對於穿著丁字褲在眾人面前展演的自卑感，正是文化復育要素中「內在的覺醒與勇氣」的展現。</label>
            <div class="feedback" id="feedback-q2"></div>
        </div>

        <div class="question-block" id="q3-block">
            <div class="question-text">3. 關於文本中的關鍵詞彙應用與字義辨析，下列選項哪些是正確無誤的？</div>
            <label class="option-label"><input type="checkbox" name="q3" value="A"> A) 「甩髮」為達悟族男性與女性在慶典中皆會頻繁使用的傳統舞蹈動作，象徵力量。</label>
            <label class="option-label"><input type="checkbox" name="q3" value="B"> B) 「九牛二虎之力」在文中極適合用來形容顏老師為了宣導並說服孩子們穿上傳統服飾所付出的極大心力。</label>
            <label class="option-label"><input type="checkbox" name="q3" value="C"> C) 「不再是……而是……」的句型，精準傳達了傳統服飾在孩子心中「否定負面觀感並轉化為肯定驕傲」的狀態轉換。</label>
            <label class="option-label"><input type="checkbox" name="q3" value="D"> D) 連接詞「甚至」在文意表達上，主要用於呈現前後句的強烈對比與轉折語氣。</label>
            <label class="option-label"><input type="checkbox" name="q3" value="E"> E) 在字義辨析中，「勉勵」與「鼓勵」皆帶有激發、勸勉對方努力之意；「歸屬」則帶有一種從屬、認同的關係。</label>
            <div class="feedback" id="feedback-q3"></div>
        </div>

        <br><br>

        <div class="question-block" id="q4-block">
            <div class="question-text">4. 根據文本中的「達悟族傳統服飾圖解」知識點，下列哪些穿搭描述是正確的？</div>
            <label class="option-label"><input type="checkbox" name="q4" value="A"> A) 丁字褲為達悟族男性的傳統標誌，其特殊的形狀與穿法皆具備特定的文化技術。</label>
            <label class="option-label"><input type="checkbox" name="q4" value="B"> B) 為了符合現代舞台規範，達悟族人在穿著傳統服飾展演時，必須穿著特製的傳統草鞋。</label>
            <label class="option-label"><input type="checkbox" name="q4" value="C"> C) 傳統上衣的編織圖騰中，女性服飾以青白相間為主，男性服飾則通常以紅黑相間來區別性別。</label>
            <label class="option-label"><input type="checkbox" name="q4" value="D"> D) 族人在傳統裝扮中使用的飾品，其材質主要涵蓋了金屬、銀片或貝類。</label>
            <label class="option-label"><input type="checkbox" name="q4" value="E"> E) 展演或參與祭典時，配戴的「禮刀」具有象徵神聖與力量的深刻文化意涵。</label>
            <div class="feedback" id="feedback-q4"></div>
        </div>

        <button type="button" class="submit-btn" onclick="checkAnswers()">送出答案，查看解析！</button>
    </form>
</div>

<script>
    function checkAnswers() {
        // 定義正確答案 (陣列形式以符合複選)
        const answers = {
            q1: ['A', 'C', 'D'],
            q2: ['A', 'B', 'E'],
            q3: ['B', 'C', 'E'],
            q4: ['A', 'D', 'E']
        };

        // 定義解析內容
        const explanations = {
            q1: "【解析】(B) 錯誤，顏老師來自臺灣本島，並非在地長老。(E) 錯誤，核心主旨包含了深層的文化認同與心理蛻變，非僅客觀記錄賽事。",
            q2: "【解析】(C) 錯誤，抗拒是因為覺得是「老人穿的」且在眾人前穿需要勇氣，而非技術問題。(D) 錯誤，顏老師代表的是「外界的欣賞與引導」。",
            q3: "【解析】(A) 錯誤，「甩髮」是達悟族女性傳統舞蹈中的關鍵動作。(D) 錯誤，「甚至」是表達更進一層的遞進連接詞，而非對比轉折。",
            q4: "【解析】(B) 錯誤，傳統上男女皆不穿鞋（打赤腳）。(C) 錯誤，文本指出上衣「男、女皆有，通常以青、白色相間的織紋為主」，未提及紅黑區別性別。"
        };

        // 批改與回饋邏輯
        for (let i = 1; i <= 4; i++) {
            let qName = 'q' + i;
            let selected = Array.from(document.querySelectorAll(`input[name="${qName}"]:checked`)).map(el => el.value);
            let correct = answers[qName];
            let feedbackEl = document.getElementById(`feedback-${qName}`);
            
            feedbackEl.style.display = 'block';
            
            // 檢查陣列是否完全相同 (排序後轉字串比較)
            let isCorrect = (selected.sort().toString() === correct.sort().toString());

            if (isCorrect) {
                feedbackEl.className = 'feedback correct';
                feedbackEl.innerHTML = `✅ 恭喜答對！完全掌握了此題的重點。<br>${explanations[qName]}`;
            } else {
                feedbackEl.className = 'feedback wrong';
                feedbackEl.innerHTML = `❌ 哎呀，少選或多選囉！正確答案是：${correct.join(', ')}。<br>${explanations[qName]}`;
            }
        }
    }
</script>

</body>
</html>
