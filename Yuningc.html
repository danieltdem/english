<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苗栗客家「螃龍」文化深度測驗</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #f4f1ea;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 10px solid #c0392b; /* 客家節慶紅 */
        }
        h1 {
            text-align: center;
            color: #c0392b;
            border-bottom: 2px dashed #c0392b;
            padding-bottom: 10px;
        }
        .intro {
            background: #fdf2f2;
            padding: 15px;
            border-left: 5px solid #e67e22;
            margin-bottom: 25px;
            font-style: italic;
        }
        .question {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background-color: #fafafa;
        }
        .question p {
            font-weight: bold;
            font-size: 1.1em;
            color: #2c3e50;
        }
        .options label {
            display: block;
            margin: 10px 0;
            cursor: pointer;
            padding: 5px;
            transition: background 0.2s;
        }
        .options label:hover {
            background-color: #eee;
        }
        button {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #c0392b;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.2em;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background-color: #a93226;
        }
        .explanation {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background-color: #e8f6f3;
            border-left: 5px solid #1abc9c;
            font-size: 0.95em;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔥 苗栗螃龍文化：深度挑戰測驗 🔥</h1>
    <div class="intro">
        親愛的同學：這是一份複選題測驗，請仔細閱讀選項。每一題都有兩個以上的正確答案，考驗你對文本細節的觀察力！
    </div>

    <form id="quizForm">
        <div class="question">
            <p>1. 關於「螃龍」的名稱釋義與文化象徵，下列敘述哪些正確？（複選）</p>
            <div class="options">
                <label><input type="checkbox" name="q1" value="A"> A. 「螃」（Pang）在客家話中意指以鞭炮炸龍的動作。</label>
                <label><input type="checkbox" name="q1" value="B"> B. 客家人將「螃龍」視為神明造訪，認為能帶來好運。</label>
                <label><input type="checkbox" name="q1" value="C"> C. 「炸龍」的習俗主要是為了慶祝農曆正月初一。</label>
                <label><input type="checkbox" name="q1" value="D"> D. 民間相信「越炸越旺」，火光與煙硝象徵運勢蒸蒸日上。</label>
                <label><input type="checkbox" name="q1" value="E"> E. 螃龍活動僅是純粹的娛樂，與族群認同或鄉土情感無關。</label>
            </div>
            </div>

        <div class="question">
            <p>2. 下列關於螃龍活動「六個階段」的描述，哪些是完全符合文本內容的？（複選）</p>
            <div class="options">
                <label><input type="checkbox" name="q2" value="A"> A. 「糊龍」是製作神龍，為整個活動的起點。</label>
                <label><input type="checkbox" name="q2" value="B"> B. 「祥龍點睛」在玉清宮舉行，目的是賦予神龍靈氣。</label>
                <label><input type="checkbox" name="q2" value="C"> C. 「跈龍」一詞中的「跈」在客語中發音為「ten」，意為「跟隨」。</label>
                <label><input type="checkbox" name="q2" value="D"> D. 「化龍返天」是活動的高潮，神龍在煙硝中穿梭，民眾投擲鞭炮。</label>
                <label><input type="checkbox" name="q2" value="E"> E. 「迎龍」象徵家家戶戶期待好運與福氣降臨。</label>
            </div>
            </div>

        <div class="question">
            <p>3. 關於「祥龍點睛」與「螃龍之夜」的細節，下列哪些描述是正確的？（複選）</p>
            <div class="options">
                <label><input type="checkbox" name="q3" value="A"> A. 點睛儀式前，神龍的狀態被描述為「雙眼無神，毫無生氣」。</label>
                <label><input type="checkbox" name="q3" value="B"> B. 點睛時使用「硃砂紅墨」點入雙眼，象徵凡物轉化為具有守護能量的神靈。</label>
                <label><input type="checkbox" name="q3" value="C"> C. 螃龍之夜時，民眾雖然害怕爆竹聲，但認為那是維持秩序的必要手段。</label>
                <label><input type="checkbox" name="q3" value="D"> D. 螃龍之夜的視覺景象包含「灰色濃煙」與「金黃火光」。</label>
                <label><input type="checkbox" name="q3" value="E"> E. 信眾認為炸龍是「驅邪避災、守護家園」的必要過程。</label>
            </div>
            </div>

        <div class="question">
            <p>4. 根據文本提供的詞語解釋與辨析，下列應用哪些是正確的？（複選）</p>
            <div class="options">
                <label><input type="checkbox" name="q4" value="A"> A. 「序幕」可用來形容重大事件的開端，例如：點睛儀式拉開了慶典的序幕。</label>
                <label><input type="checkbox" name="q4" value="B"> B. 「穿梭」形容往來頻繁，例如：神龍在街道間穿梭。</label>
                <label><input type="checkbox" name="q4" value="C"> C. 「儀」代表法規程序（如：禮儀），「義」代表公正合宜（如：正義）。</label>
                <label><input type="checkbox" name="q4" value="D"> D. 「懷」代表不良、惡劣；「壞」代表存有、抱著。</label>
                <label><input type="checkbox" name="q4" value="E"> E. 「挨家挨戶」意指依照次序一家接著一家。</label>
            </div>
            </div>

        <div class="question">
            <p>5. 關於「生氣」一詞的多義性以及文本的結論，下列敘述哪些符合內容？（複選）</p>
            <div class="options">
                <label><input type="checkbox" name="q5" value="A"> A. 「生氣」可指活潑有朝氣，如：點睛後的龍充滿生氣。</label>
                <label><input type="checkbox" name="q5" value="B"> B. 「生氣」可指發怒，如：他忘了帶器材，讓人很生氣。</label>
                <label><input type="checkbox" name="q5" value="C"> C. 曉霜收到阿公送的「福菜」與「明信片」，象徵文化的代際傳遞。</label>
                <label><input type="checkbox" name="q5" value="D"> D. 「化龍返天」象徵神龍功德圓滿，火化後返回天庭。</label>
                <label><input type="checkbox" name="q5" value="E"> E. 文本強調，比起熱鬧的活動，更重要的是讓後輩能深刻認識並尊重客家文化。</label>
            </div>
            </div>

        <button type="button" onclick="checkAnswers()">提交測驗</button>
    </form>

    <div id="result" style="display:none; margin-top: 20px; padding: 20px; border-radius: 10px;"></div>
</div>

<script>
    function checkAnswers() {
        const answers = {
            q1: ['A', 'B', 'D'],
            q2: ['A', 'B', 'C', 'E'],
            q3: ['A', 'B', 'D', 'E'],
            q4: ['A', 'B', 'C', 'E'],
            q5: ['A', 'B', 'C', 'D', 'E']
        };

        const explanations = {
            q1: "解析：(C) 應為農曆正月十五元宵節而非正月初一；(E) 文本強調這能強化家鄉情感與族群認同。",
            q2: "解析：(D) 活動高潮是「螃龍之夜」，「化龍返天」是活動的結尾（火化燃燒）。",
            q3: "解析：(C) 文本中提到爆竹聲震天是為了「驅邪避災」，並非為了「維持秩序」。",
            q4: "解析：(D) 選項將字義顛倒了，「懷」是存有（如懷抱），「壞」是不良（如壞人）。",
            q5: "解析：此題所有選項皆正確，完整涵蓋了詞彙多義性、文本情節與最終傳承的核心價值。"
        };

        let score = 0;
        let total = 5;
        let report = "<h3>測驗結果報告：</h3>";

        for (let i = 1; i <= total; i++) {
            const qName = 'q' + i;
            const selected = Array.from(document.querySelectorAll(`input[name="${qName}"]:checked`)).map(el => el.value);
            const correct = answers[qName];
            
            const isCorrect = selected.length === correct.length && selected.every(val => correct.includes(val));
            
            if (isCorrect) {
                score++;
                report += `<p style="color: green;">第 ${i} 題 正確！✅</p>`;
            } else {
                report += `<p style="color: red;">第 ${i} 題 錯誤 ❌ (正確答案為: ${correct.join(', ')})<br><small>${explanations[qName]}</small></p>`;
            }
        }

        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        resultDiv.style.backgroundColor = score === total ? '#d4edda' : '#f8d7da';
        resultDiv.innerHTML = report + `<h4>總分：${score} / ${total}</h4>`;
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>

</body>
</html>
